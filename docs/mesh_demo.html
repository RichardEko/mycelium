<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mycelium Mesh Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f8fafc;
  --card:     #ffffff;
  --border:   #e2e8f0;
  --text:     #0f172a;
  --muted:    #64748b;
  --em:       #059669; --em-bg: #d1fae5;
  --warn:     #d97706; --warn-bg: #fef3c7;
  --violet:   #7c3aed; --violet-bg: #ede9fe;
  --blue:     #2563eb; --blue-bg: #dbeafe;
  --rose:     #e11d48; --rose-bg: #ffe4e6;
  --gray:     #6b7280; --gray-bg: #f3f4f6;
  --amber:    #92400e; --amber-bg: #fef3c7;
  --radius:   6px;
  --shadow:   0 1px 3px rgba(0,0,0,.08);
}

body { background: var(--bg); font-family: system-ui,-apple-system,"Segoe UI",sans-serif;
       font-size: 12px; color: var(--text); }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 40;
  background: rgba(255,255,255,.9); backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(0,0,0,.08);
  padding: 0 20px; height: 44px;
  display: flex; align-items: center; gap: 14px;
}
.logo { font-weight: 700; font-size: 13px; }
.logo span { color: var(--em); }
.pill { display:inline-flex; align-items:center; gap:4px;
        padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.pill.ok     { background: var(--em-bg);   color: var(--em);   }
.pill.warn   { background: var(--rose-bg); color: var(--rose); }
.pill.loaded { background: #e0f2fe;        color: #0369a1;     }
.pill.idle   { background: var(--gray-bg); color: var(--gray); }
.refresh-btn { margin-left: auto; background: none; border: 1px solid var(--border);
               border-radius: var(--radius); padding: 3px 10px; cursor: pointer; font-size: 11px; color: var(--muted); }

/* ── Layout ── */
main { max-width: 1100px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

section { background: var(--card); border: 1px solid var(--border);
          border-radius: var(--radius); box-shadow: var(--shadow); }
.sec-title { text-transform: uppercase; font-size: 0.65rem; letter-spacing: .08em;
             font-weight: 700; color: var(--muted); padding: 10px 14px 0; }

/* ── System Library ── */
.system-bar { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
.system-btn { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
              padding: 4px 10px; cursor: pointer; font-size: 11px; transition: background .12s; }
.system-btn:hover  { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.system-btn.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); font-weight: 600; }
.system-btn.loaded { background: #fef9c3; border-color: #ca8a04; color: #92400e; font-weight: 600; }

/* ── About ── */
.about-body { padding: 12px 14px 14px; display: flex; gap: 14px; align-items: flex-start; }
.about-text { line-height: 1.65; flex: 1; }
.about-text code { background: var(--gray-bg); padding: 0 3px; border-radius: 3px; font-size: 10px; }
.about-concept { white-space: nowrap; background: var(--blue-bg); color: var(--blue);
                 border-radius: 99px; padding: 4px 12px; font-size: 11px; font-weight: 600; }

/* ── Topology ── */
#topo-section { overflow: visible; }
.topo-canvas { position: relative; padding: 0; min-height: 80px; }
/* Active stage: absolutely-positioned groups for 2-D layout */
.topo-stage { position: relative; padding: 14px; overflow: visible; }
/* Staged preview falls back to flex */
.topo-stage.is-staged { display: flex; flex-wrap: wrap; gap: 20px; }
.topo-stage.is-staged .topo-group { position: static !important; transform: none !important; }
/* Active groups anchored at center point (transform centers horizontally & vertically) */
.topo-group { display: flex; flex-direction: column; gap: 6px; min-width: 130px; max-width: 155px; }
.topo-stage:not(.is-staged) .topo-group { position: absolute; transform: translate(-50%, -50%); }
.group-hdr { display: flex; align-items: baseline; gap: 5px; }
.group-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; font-weight: 700; color: var(--muted); }
.group-count { font-size: 9px; color: var(--muted); }
/* Spare pool: dashed-amber strip below the active stage */
.spare-pool { border-top: 1px dashed #d97706; padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 10px; }
.spare-pool-hdr { font-size: 9px; text-transform: uppercase; letter-spacing: .1em;
                  color: #b45309; font-weight: 700; }
.spare-pool-section { display: flex; flex-direction: column; gap: 6px; }
.spare-pool-sub { font-size: 9px; text-transform: uppercase; letter-spacing: .07em;
                  color: var(--muted); margin-bottom: 4px; }
.spare-pool-sub.failed-sub { color: var(--rose); }
.spare-pool-groups { display: flex; flex-wrap: wrap; gap: 12px; }

/* ── Node cards ── */
.node-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
             padding: 8px 10px; display: flex; flex-direction: column; gap: 3px; min-width: 112px; }
.node-card.spare  { border-style: dashed; border-color: #d97706; background: #fffbeb; opacity: .8; }
.node-card.failed { border-style: dashed; border-color: #e11d48; background: #fff1f2; opacity: .8; }
.node-card.loaded { border-style: dashed; opacity: .45; }
.node-card.paused { opacity: .55; }
.node-label { font-weight: 600; font-size: 11px; }
.node-cap   { color: var(--muted); font-size: 10px; font-family: monospace; }
.node-state { font-size: 10px; font-weight: 600; border-radius: 4px; padding: 1px 5px;
              display: inline-block; margin-top: 2px; }
.node-sigs  { margin-top: 4px; display: flex; flex-direction: column; gap: 2px; }
.sig { font-size: 9px; font-family: monospace; padding: 1px 4px; border-radius: 3px;
       background: var(--gray-bg); color: var(--gray); }
.sig.emit    { background: var(--violet-bg); color: var(--violet); }
.sig.recv    { background: var(--em-bg);     color: var(--em);     }
.sig.provide { background: var(--blue-bg);   color: var(--blue);   }
.sig.use     { background: var(--warn-bg);   color: var(--warn);   }
.node-actions { margin-top: 5px; }
.node-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
            padding: 2px 7px; cursor: pointer; font-size: 10px; color: var(--muted); }
.node-btn.kill:hover  { border-color: var(--rose); color: var(--rose); }
.node-btn.start:hover { border-color: var(--em);   color: var(--em);   }

/* state badge colors */
.st-running    { background: var(--em-bg);     color: var(--em);     }
.st-ready      { background: var(--em-bg);     color: var(--em);     }
.st-suppressed { background: var(--warn-bg);   color: var(--warn);   }
.st-emitting   { background: var(--violet-bg); color: var(--violet); }
.st-planning   { background: var(--blue-bg);   color: var(--blue);   }
.st-invoking   { background: var(--blue-bg);   color: var(--blue);   }
.st-reflecting { background: var(--blue-bg);   color: var(--blue);   }
.st-offline    { background: var(--gray-bg);   color: var(--gray);   }
.st-standby    { background: #fef3c7;          color: #92400e;       }
.st-failed     { background: var(--rose-bg);  color: var(--rose);   font-weight: 700; }
.st-loaded     { background: var(--gray-bg);   color: var(--gray);   font-style: italic; }
.st-other      { background: var(--gray-bg);   color: var(--gray);   }

/* ── SVG edge overlay ── */
svg.edges { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: visible; }

/* ── Groups table ── */
.groups-tbl { width: 100%; border-collapse: collapse; }
.groups-tbl th { text-align: left; padding: 6px 14px; font-size: 10px; text-transform: uppercase;
                 letter-spacing: .07em; color: var(--muted); border-bottom: 1px solid var(--border); }
.groups-tbl td { padding: 7px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.groups-tbl tr:last-child td { border-bottom: none; }
.ctrl-btn { background: none; border: 1px solid var(--border); border-radius: 4px;
            padding: 2px 8px; cursor: pointer; font-size: 10px; color: var(--muted); margin-right: 4px; }
.ctrl-btn.stop:hover  { border-color: var(--rose); color: var(--rose); }
.ctrl-btn.start:hover { border-color: var(--em);   color: var(--em);   }

/* ── System controls ── */
.sys-ctrl { display: flex; gap: 8px; padding: 10px 14px; flex-wrap: wrap; align-items: center; }
.sys-btn { border: 1px solid var(--border); border-radius: var(--radius);
           padding: 5px 14px; cursor: pointer; font-size: 11px; background: var(--card); }
.sys-btn.go      { background: var(--em-bg);   border-color: var(--em);   color: var(--em);   font-weight:600; }
.sys-btn.go:hover{ background: #a7f3d0; }
.sys-btn.stop:hover    { background: var(--rose-bg); border-color: var(--rose); color: var(--rose); }
.sys-btn.pause:hover   { background: var(--warn-bg); border-color: var(--warn); color: var(--warn); }
.sys-btn.resume:hover  { background: var(--em-bg);   border-color: var(--em);   color: var(--em);   }
.sys-btn.trigger:hover { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }

/* ── Event log ── */
.log-wrap { max-height: 220px; overflow-y: auto; padding: 6px 14px 12px; }
.log-row { display: flex; gap: 10px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.log-row:last-child { border-bottom: none; }
.log-time   { color: var(--muted); white-space: nowrap; min-width: 88px; font-family: monospace; font-size: 10px; }
.log-evt    { font-weight: 700; min-width: 88px; font-size: 11px; }
.log-detail { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 580px; font-size: 11px; }
/* event-type coloring */
.evt-provision  { color: var(--blue); }
.evt-spare      { color: var(--warn); }
.evt-kill,.evt-warning { color: var(--rose); }
.evt-promoted,.evt-autoheal { color: var(--em); }
.evt-heartbeat  { color: var(--em); }
.evt-worker,.evt-suppressed { color: var(--violet); }
.evt-planner,.evt-factcheck,.evt-synthesizer { color: var(--blue); }
.evt-proposer,.evt-vote,.evt-commit { color: var(--violet); }
.evt-alert      { color: var(--rose); font-weight: 800; }
.evt-state,.evt-task,.evt-invoking,.evt-result { color: var(--blue); }
.evt-default    { color: var(--muted); }
/* live pulse on first log row */
.log-row.fresh { animation: fadeIn .4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── Upload ── */
.upload-area { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.upload-row  { display: flex; gap: 8px; align-items: center; }
textarea.mta { font-family: monospace; font-size: 11px; width: 100%; height: 80px;
               border: 1px solid var(--border); border-radius: var(--radius);
               padding: 6px 8px; resize: vertical; background: var(--bg); }
.upload-btn { border: 1px solid var(--border); border-radius: var(--radius);
              padding: 5px 14px; cursor: pointer; font-size: 11px; background: var(--card); }
.upload-btn:hover { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.umsg { font-size: 11px; }
.umsg.ok  { color: var(--em); }
.umsg.err { color: var(--rose); }
</style>
</head>
<body>

<header>
  <div class="logo"><span>◉</span> mycelium</div>
  <span style="color:var(--border)">|</span>
  <div id="hdr-system" style="font-weight:600">—</div>
  <div id="hdr-ver"    style="color:var(--muted)"></div>
  <div id="hdr-health"></div>
  <button class="refresh-btn" onclick="poll()">↺ refresh</button>
</header>

<main>

  <!-- System Library -->
  <section>
    <div class="sec-title">SYSTEM LIBRARY</div>
    <div class="system-bar" id="system-bar">Loading…</div>
  </section>

  <!-- About this system -->
  <section id="about-section" style="display:none">
    <div class="sec-title">SYSTEM</div>
    <div class="about-body" id="about-body"></div>
  </section>

  <!-- Topology -->
  <section id="topo-section">
    <div class="sec-title">TOPOLOGY</div>
    <div class="topo-canvas" id="topo-canvas">
      <div style="padding:14px;color:var(--muted)">Select a System from the Library to preview the topology</div>
    </div>
  </section>

  <!-- Groups -->
  <section>
    <div class="sec-title">GROUPS</div>
    <table class="groups-tbl">
      <thead><tr><th>NAME</th><th>ACTIVE/MIN</th><th>SPARES</th><th>STATUS</th><th>CONTROLS</th></tr></thead>
      <tbody id="groups-body"></tbody>
    </table>
  </section>

  <!-- System controls -->
  <section>
    <div class="sec-title">SYSTEM</div>
    <div class="sys-ctrl" id="sys-ctrl"></div>
  </section>

  <!-- Event log -->
  <section>
    <div class="sec-title">EVENT LOG</div>
    <div class="log-wrap" id="log-wrap"></div>
  </section>

  <!-- Manifest upload -->
  <section>
    <div class="sec-title">UPLOAD MANIFEST</div>
    <div class="upload-area">
      <div class="upload-row">
        <input type="file" accept=".toml,text/plain" id="file-input" style="font-size:11px">
        <button class="upload-btn" onclick="uploadManifest()">↑ Upload</button>
        <span class="umsg" id="umsg"></span>
      </div>
      <textarea class="mta" id="mta" placeholder="Paste TOML manifest here…"></textarea>
    </div>
  </section>

</main>

<script>
// ── State → CSS class ─────────────────────────────────────────────────────────
function stateClass(s) {
  const map = {
    Running: 'st-running', Ready: 'st-ready', Suppressed: 'st-suppressed',
    Emitting: 'st-emitting', Planning: 'st-planning', Invoking: 'st-invoking',
    Reflecting: 'st-reflecting', Offline: 'st-offline',
    Standby: 'st-standby', Failed: 'st-failed', Loaded: 'st-loaded',
  };
  return map[s] || 'st-other';
}

// ── Signal annotations per capability ─────────────────────────────────────────
// Capabilities that are hardware-intrinsic (cannot be conferred by management agent alone)
const INTRINSIC_CAPS = new Set([
  'compute/gpu', 'compute/gpu-heavy',
  'data/realtime', 'llm/inference',
  'storage/disk', 'render/job',
]);

const CAP_SIGNALS = {
  'routing/emitter':        { emit: ['compute.invoke'] },
  'routing/dispatcher':     { emit: ['compute.invoke'] },
  'compute/cpu':            { recv: ['compute.invoke'], provide: ['search','calculate'] },
  'compute/cpu-heavy':      { recv: ['compute.invoke'] },
  'compute/gpu':            { recv: ['compute.invoke'] },
  'llm/inference':          { use:  ['tools (MCP RPC)'] },
  'data/realtime':          { provide: ['weather','ping'] },
  'reasoning/planner':      { emit: ['reasoning.task'],     recv: ['reasoning.result'] },
  'reasoning/fact-checker': { recv: ['reasoning.task'],     emit: ['reasoning.verified'] },
  'reasoning/synthesizer':  { recv: ['reasoning.verified'], emit: ['reasoning.result'] },
  'consensus/proposer':     { emit: ['consensus.ballot'],   recv: ['consensus.vote'] },
  'consensus/voter':        { recv: ['consensus.ballot'],   emit: ['consensus.vote'] },
  'health/heartbeat':       { emit: ['health.heartbeat'] },
  'health/watchdog':        { recv: ['health.heartbeat'] },
  'render/consumer':        { emit: ['render.job'] },
  'render/job':             { recv: ['render.job'] },
  'signal/propagate':       { recv: ['epidemic.wave'], emit: ['epidemic.wave'] },
  'ai/agent':               { emit: ['ai.request'] },
};

// ── Signal flow edges ─────────────────────────────────────────────────────────
// [from-cap, to-cap, label, color]
const SIGNAL_FLOWS = [
  ['routing/emitter',        'compute/cpu',             'compute.invoke',     '#7c3aed'],
  ['routing/emitter',        'compute/cpu-heavy',       'compute.invoke',     '#7c3aed'],
  ['routing/emitter',        'compute/gpu',             'compute.invoke',     '#7c3aed'],
  ['routing/dispatcher',     'compute/cpu',             'compute.invoke',     '#7c3aed'],
  ['routing/dispatcher',     'compute/cpu-heavy',       'compute.invoke',     '#7c3aed'],
  ['data/realtime',          'llm/inference',           'tools (MCP)',        '#059669'],
  ['compute/cpu',            'llm/inference',           'tools (MCP)',        '#059669'],
  ['reasoning/planner',      'reasoning/fact-checker',  'reasoning.task',     '#2563eb'],
  ['reasoning/fact-checker', 'reasoning/synthesizer',   'reasoning.verified', '#059669'],
  ['reasoning/synthesizer',  'reasoning/planner',       'reasoning.result',   '#d97706'],
  ['consensus/proposer',     'consensus/voter',         'consensus.ballot',   '#7c3aed'],
  ['consensus/voter',        'consensus/proposer',      'consensus.vote',     '#059669'],
  ['health/heartbeat',       'health/watchdog',         'health.heartbeat',   '#059669'],
  ['render/consumer',        'render/job',              'render.job',         '#7c3aed'],
  ['signal/propagate',       'signal/propagate',        'epidemic.wave',      '#2563eb'],
];

// ── Preset descriptions ───────────────────────────────────────────────────────
const PRESET_DESC = {
  'llm-agent': {
    concept: 'MCP Tool Discovery + Gossip RPC',
    text: 'An LLM inference node scans the gossip KV store to discover tools advertised by data and compute nodes, then invokes them via gossip RPC — no central coordinator, no hardcoded endpoints. Kill a compute node: its tools are tombstoned out of KV; a spare steps up within seconds.',
  },
  'signal-suppress': {
    concept: 'Emergent Load Balancing via Refractory Periods',
    text: 'Emitters broadcast <code>compute.invoke</code> at full rate. Each worker self-suppresses for a refractory period after processing — no dispatcher needed. The mesh naturally routes each signal to whichever worker is unsuppressed. Watch the log: kill a worker and a spare immediately steps up.',
  },
  'multi-agent-mesh': {
    concept: 'Coalition Reasoning via Gossip Signals',
    text: 'Planners emit <code>reasoning.task</code>; fact-checkers verify and emit <code>reasoning.verified</code>; synthesizers aggregate and emit <code>reasoning.result</code> back to planners. All coordination via epidemic signal propagation — no shared state, no central router.',
  },
  'consensus-cluster': {
    concept: 'Epidemic Two-Phase Ballot',
    text: 'A proposer broadcasts <code>consensus.ballot</code> and collects <code>consensus.vote</code> replies within a deadline window. Quorum without leader election or a consensus algorithm. Kill voters mid-round: spares step up and the next round completes normally.',
  },
  'watchdog-cluster': {
    concept: 'Circuit Breaker via Signal Presence',
    text: 'Heartbeat nodes emit <code>health.heartbeat</code> every second. The watchdog monitors for gaps: silence beyond a threshold trips the circuit breaker and emits <code>health.alert</code>. Kill a service node — the watchdog fires within 3 s; watch the spare step up immediately in the topology.',
  },
  'dispatch-pool': {
    concept: 'Tiered Capability Resolution',
    text: 'Dispatchers call <code>resolve()</code> each cycle, routing to whichever fast or slow worker is ready. Kill a worker: its spare steps up. The dispatcher never notices — it just resolves the next available capability.',
  },
  'epidemic-ring': {
    concept: 'Signal Propagation across Partitions',
    text: 'Alpha and beta ring nodes each relay <code>epidemic.wave</code> on receipt, adding random jitter. Watch the log: a single emit spreads through the entire ring. Kill half the alpha ring — spares maintain propagation coverage.',
  },
  'minimal': {
    concept: 'Single-Node Baseline',
    text: 'One data node advertising realtime tools. A clean starting point for verifying gossip KV propagation, capability advertisement, and tool discovery.',
  },
  'emergent-pool': {
    concept: 'Self-Assembling GPU Pools',
    text: 'GPU workers self-advertise capability. A consumer resolves the nearest via <code>resolve_with_locality</code> and emits <code>render.job</code> directly to it. Kill a GPU worker — the spare promotes and the next resolve picks it up automatically.',
  },
  'capability-market': {
    concept: 'Dynamic Advertisement Under Demand',
    text: 'Four capability kinds are advertised and withdrawn based on activity. Demonstrates gossip KV + capability TTL churn handling — nodes appear, disappear, and re-appear as demand changes.',
  },
  'locality-mesh': {
    concept: 'Locality-Aware Capability Routing',
    text: 'East and west render providers advertise with locality metadata. <code>resolve_with_locality</code> selects the nearest provider. Kill a regional node — its spare carries the same locality metadata and routing decisions continue seamlessly.',
  },
};

let cachedPresets = [];

// ── Fetch helpers ─────────────────────────────────────────────────────────────
const get  = url  => fetch(url).then(r => r.json());
const post = (url, body) => fetch(url, body
  ? { method:'POST', headers:{'Content-Type':'text/plain'}, body }
  : { method:'POST' }).then(r => r.json());

// ── Main render ───────────────────────────────────────────────────────────────
function renderState(s) {
  const running  = !!s.running;
  const activeId = running ? nameToId(s.system) : nameToId(s.loaded_system);

  // Header
  document.getElementById('hdr-system').textContent =
    running ? (s.system || '—') : (s.loaded_system || '—');
  document.getElementById('hdr-ver').textContent =
    running ? (s.version ? `v${s.version}` : '')
            : (s.loaded_version ? `v${s.loaded_version}` : '');
  document.getElementById('hdr-health').innerHTML =
    running ? (s.healthy ? '<span class="pill ok">● HEALTHY</span>'
                         : '<span class="pill warn">● DEGRADED</span>')
            : (s.loaded_system ? '<span class="pill loaded">○ LOADED</span>'
                               : '<span class="pill idle">○ IDLE</span>');

  renderAbout(activeId);
  renderTopology(s);
  renderSysCtrl(s, running);
  renderGroups(s, running);
  renderLog(s.log || []);

  // System library highlight
  document.querySelectorAll('.system-btn').forEach(btn => {
    const pid = btn.dataset.pid;
    btn.classList.toggle('active', running  && pid === activeId);
    btn.classList.toggle('loaded', !running && pid === activeId);
  });
}

// ── About section ─────────────────────────────────────────────────────────────
function renderAbout(pid) {
  const sec  = document.getElementById('about-section');
  const body = document.getElementById('about-body');
  const d    = PRESET_DESC[pid];
  if (!d) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  body.innerHTML =
    `<div class="about-text">${d.text}</div>`+
    `<div><span class="about-concept">⚡ ${esc(d.concept)}</span></div>`;
}

// ── 2-D group layout ──────────────────────────────────────────────────────────
// Estimates node-card height in pixels so we can compute stage dimensions.
const NODE_CARD_H = 90, GROUP_HDR_H = 30, NODE_GAP = 6;
function groupHeightPx(count) { return GROUP_HDR_H + count * (NODE_CARD_H + NODE_GAP); }

function computeGroupLayout(activeNodes, byGroup, order) {
  if (!order.length) return { positions: {}, stageW: 300, stageH: 200 };

  // cap → set of groups present
  const capToGroups = {};
  activeNodes.forEach(n => {
    const k = `${n.ns}/${n.cap_name}`;
    if (!capToGroups[k]) capToGroups[k] = new Set();
    capToGroups[k].add(n.group);
  });

  // directed group→group edges derived from SIGNAL_FLOWS
  const edgeSet = new Set();
  const outDeg = {}, inDeg = {};
  order.forEach(g => { outDeg[g] = 0; inDeg[g] = 0; });
  SIGNAL_FLOWS.forEach(([fc, tc]) => {
    const fgs = capToGroups[fc] || new Set();
    const tgs = capToGroups[tc] || new Set();
    fgs.forEach(fg => tgs.forEach(tg => {
      if (fg === tg) return;
      const key = `${fg}→${tg}`;
      if (!edgeSet.has(key)) { edgeSet.add(key); outDeg[fg]++; inDeg[tg]++; }
    }));
  });

  const groupHs = {};
  order.forEach(g => { groupHs[g] = groupHeightPx(byGroup[g].length); });
  const maxGroupH = Math.max(...Object.values(groupHs));
  const GROUP_W = 150, PAD = 24;

  // Detect pure ring (cycle): every group has both in and out edges, 3+ groups
  const isRing = order.length >= 3 && order.every(g => inDeg[g] > 0 && outDeg[g] > 0);

  const positions = {};

  if (isRing) {
    // Circular layout — radius scaled to largest group so nothing clips
    const r = Math.max(maxGroupH * 0.65 + 50, 90);
    const stageW = Math.round(2 * (r + GROUP_W/2 + PAD));
    const stageH = Math.round(2 * (r + maxGroupH/2 + PAD));
    const cx = stageW / 2, cy = stageH / 2;
    order.forEach((g, i) => {
      const angle = (2 * Math.PI * i / order.length) - Math.PI / 2;
      positions[g] = { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
    });
    return { positions, stageW, stageH };
  }

  // Layered layout: tier 0 = sources, 1 = relay, 2 = sinks
  const tier = {};
  order.forEach(g => {
    if      (inDeg[g] === 0 && outDeg[g] > 0) tier[g] = 0;
    else if (outDeg[g] === 0 && inDeg[g] > 0) tier[g] = 2;
    else                                        tier[g] = 1;
  });

  // If every group landed in the same tier (e.g. 2-group bidirectional),
  // spread them evenly across tiers to get a side-by-side layout.
  const usedTiersCheck = new Set(order.map(g => tier[g]));
  if (usedTiersCheck.size === 1 && order.length >= 2) {
    order.forEach((g, i) => { tier[g] = (i % 3 === 0 ? 0 : i % 3 === 1 ? 2 : 1); });
  }

  const tierGroups = { 0: [], 1: [], 2: [] };
  order.forEach(g => tierGroups[tier[g]].push(g));
  const usedTiers = [0, 1, 2].filter(t => tierGroups[t].length);
  const nTiers = usedTiers.length;

  // Stage dimensions
  const maxTierH = Math.max(...usedTiers.map(t =>
    tierGroups[t].reduce((s, g) => s + groupHs[g], 0) + (tierGroups[t].length - 1) * PAD));
  const stageW = nTiers === 1
    ? Math.round(GROUP_W + 2*PAD)
    : Math.round(nTiers * (GROUP_W + 80) + 2*PAD);
  const stageH = Math.round(maxTierH + 2 * PAD);

  usedTiers.forEach((t, ti) => {
    const tgs = tierGroups[t];
    const x = nTiers === 1
      ? stageW / 2
      : PAD + (GROUP_W/2) + ti * (stageW - GROUP_W - 2*PAD) / (nTiers - 1);
    const totalH = tgs.reduce((s, g) => s + groupHs[g], 0) + (tgs.length - 1) * PAD;
    let y = (stageH - totalH) / 2;
    tgs.forEach(g => {
      const h = groupHs[g];
      positions[g] = { x: Math.round(x), y: Math.round(y + h / 2) };
      y += h + PAD;
    });
  });

  return { positions, stageW, stageH };
}

// ── Topology ──────────────────────────────────────────────────────────────────
function renderTopology(s) {
  const canvas = document.getElementById('topo-canvas');
  canvas.querySelectorAll('svg.edges').forEach(e => e.remove());

  const running = !!s.running;
  let nodes, staged = false;
  if (running && s.nodes && s.nodes.length) {
    nodes = s.nodes;
  } else if (!running && s.loaded_nodes && s.loaded_nodes.length) {
    nodes = s.loaded_nodes; staged = true;
  } else {
    canvas.innerHTML = '<div style="padding:14px;color:var(--muted)">Select a System from the Library to preview the topology</div>';
    return;
  }

  const activeNodes  = nodes.filter(n => !n.is_spare && !n.failed);
  const standbyNodes = nodes.filter(n =>  n.is_spare && !n.failed);
  const failedNodes  = nodes.filter(n =>  n.failed);

  // Group active nodes, preserving insertion order
  const order = [], byGroup = {};
  activeNodes.forEach(n => {
    if (!byGroup[n.group]) { order.push(n.group); byGroup[n.group] = []; }
    byGroup[n.group].push(n);
  });

  let stageHtml;
  if (staged) {
    // Staged preview: simple flex row, no 2-D positioning
    stageHtml = `<div class="topo-stage is-staged" id="topo-stage">` +
      order.map(g => `<div class="topo-group" data-group="${esc(g)}">
        <div class="group-hdr">
          <div class="group-label">${esc(g)}</div>
          <div class="group-count">${byGroup[g].length} node${byGroup[g].length>1?'s':''}</div>
        </div>
        ${byGroup[g].map(n => nodeCard(n, true)).join('')}
      </div>`).join('') + `</div>`;
  } else {
    const { positions, stageW, stageH } = computeGroupLayout(activeNodes, byGroup, order);
    stageHtml = `<div class="topo-stage" id="topo-stage" style="height:${stageH}px;min-width:${stageW}px">` +
      order.map(g => {
        const pos = positions[g] || { x: stageW/2, y: stageH/2 };
        return `<div class="topo-group" data-group="${esc(g)}" style="left:${pos.x}px;top:${pos.y}px">
          <div class="group-hdr">
            <div class="group-label">${esc(g)}</div>
            <div class="group-count">${byGroup[g].length} active</div>
          </div>
          ${byGroup[g].map(n => nodeCard(n, false)).join('')}
        </div>`;
      }).join('') + `</div>`;
  }

  // Spare pool strip — standby + failed sub-sections
  let spareHtml = '';
  if ((standbyNodes.length || failedNodes.length) && !staged) {
    const standbyHtml = standbyNodes.length
      ? `<div class="spare-pool-section">
          <div class="spare-pool-sub">${standbyNodes.length} standby — ready to promote</div>
          <div class="spare-pool-groups">${standbyNodes.map(n =>
            `<div style="position:static;transform:none">${nodeCard(n, false)}</div>`
          ).join('')}</div>
        </div>`
      : '';

    const failedHtml = failedNodes.length
      ? `<div class="spare-pool-section">
          <div class="spare-pool-sub failed-sub">${failedNodes.length} failed</div>
          <div class="spare-pool-groups">${failedNodes.map(n =>
            `<div style="position:static;transform:none">${nodeCard(n, false)}</div>`
          ).join('')}</div>
        </div>`
      : '';

    spareHtml = `<div class="spare-pool">
      <div class="spare-pool-hdr">◈ spare pool</div>
      ${standbyHtml}${failedHtml}
    </div>`;
  }

  canvas.innerHTML = stageHtml + spareHtml;
  requestAnimationFrame(() => drawEdges(activeNodes, staged));
}

function nodeCard(n, staged) {
  const isFailed  = !!n.failed;
  const isStandby = !!n.is_spare && !isFailed;
  const isPaused  = !!n.paused;
  const cap       = `${n.ns}/${n.cap_name}`;
  const sCls      = stateClass(staged ? 'Loaded' : n.state);

  let cardCls = 'node-card';
  if (staged)         cardCls += ' loaded';
  else if (isFailed)  cardCls += ' failed';
  else if (isStandby) cardCls += ' spare';
  else if (isPaused)  cardCls += ' paused';

  // Capability line — differs by role
  let capLine = '';
  if (staged || (!isStandby && !isFailed)) {
    capLine = `<div class="node-cap">${esc(cap)}</div>`;
  } else if (isFailed) {
    // Show what capability was lost
    capLine = `<div class="node-cap" style="color:var(--rose)">✕ ${esc(cap)}</div>`;
  } else {
    // Standby spare: show intrinsic caps if any, else "unassigned"
    const ic = n.intrinsic_caps || [];
    capLine = ic.length
      ? `<div class="node-cap" style="color:#b45309">has: ${esc(ic.join(', '))}</div>`
      : `<div class="node-cap" style="color:var(--muted)">unassigned</div>`;
  }

  // Signal badges (only on fully active, non-staged nodes)
  let sigs = '';
  if (!staged && !isStandby && !isFailed) {
    const info = CAP_SIGNALS[cap];
    if (info) {
      const tags = [
        ...(info.emit    || []).map(s => `<span class="sig emit">→ ${esc(s)}</span>`),
        ...(info.recv    || []).map(s => `<span class="sig recv">← ${esc(s)}</span>`),
        ...(info.provide || []).map(s => `<span class="sig provide">⊕ ${esc(s)}</span>`),
        ...(info.use     || []).map(s => `<span class="sig use">⊙ ${esc(s)}</span>`),
      ];
      if (tags.length) sigs = `<div class="node-sigs">${tags.join('')}</div>`;
    }
  }

  // Kill button only on active, unpaused nodes
  let actions = '';
  if (!staged && !isStandby && !isFailed) {
    if (!isPaused) {
      actions = `<div class="node-actions"><button class="node-btn kill" onclick="nodeKill('${esc(n.label)}')">✕ Kill</button></div>`;
    } else {
      actions = `<div class="node-actions"><button class="node-btn start" onclick="nodeStart('${esc(n.label)}')">↑ Start</button></div>`;
    }
  }

  const stateLabel = staged ? 'Loaded' : n.state;

  return `<div class="${cardCls}">
    <div class="node-label">${esc(n.label)}</div>
    ${capLine}
    <span class="node-state ${sCls}">${esc(stateLabel)}</span>
    ${sigs}${actions}
  </div>`;
}

// ── SVG signal edges ──────────────────────────────────────────────────────────
// Returns the best entry/exit points between two rects and bezier control points.
// Chooses horizontal connection when dx > dy, vertical otherwise.
function edgePoints(fr, tr, cr) {
  const fcx = fr.left + fr.width/2  - cr.left;
  const fcy = fr.top  + fr.height/2 - cr.top;
  const tcx = tr.left + tr.width/2  - cr.left;
  const tcy = tr.top  + tr.height/2 - cr.top;
  const dx = tcx - fcx, dy = tcy - fcy;

  let x1, y1, x2, y2, cp1x, cp1y, cp2x, cp2y;
  if (Math.abs(dx) >= Math.abs(dy)) {
    // Horizontal: connect right↔left edges
    if (dx > 0) {
      x1 = fr.right - cr.left;  y1 = fcy;
      x2 = tr.left  - cr.left;  y2 = tcy;
    } else {
      x1 = fr.left  - cr.left;  y1 = fcy;
      x2 = tr.right - cr.left;  y2 = tcy;
    }
    const mx = (x1 + x2) / 2;
    cp1x = mx; cp1y = y1; cp2x = mx; cp2y = y2;
  } else {
    // Vertical: connect bottom↔top edges
    if (dy > 0) {
      x1 = fcx; y1 = fr.bottom - cr.top;
      x2 = tcx; y2 = tr.top    - cr.top;
    } else {
      x1 = fcx; y1 = fr.top    - cr.top;
      x2 = tcx; y2 = tr.bottom - cr.top;
    }
    const my = (y1 + y2) / 2;
    cp1x = x1; cp1y = my; cp2x = x2; cp2y = my;
  }
  // Bezier midpoint approximation for label placement
  const lx = (x1 + x2 + cp1x + cp2x) / 4;
  const ly = (y1 + y2 + cp1y + cp2y) / 4;
  return { x1, y1, x2, y2, cp1x, cp1y, cp2x, cp2y, lx, ly };
}

function drawEdges(activeNodes, staged) {
  // Anchor the SVG to the topo-stage, not the outer canvas
  const stage = document.getElementById('topo-stage');
  if (!stage) return;
  stage.querySelectorAll('svg.edges').forEach(e => e.remove());

  // cap → groups present among active nodes only
  const capToGroups = {};
  activeNodes.forEach(n => {
    const k = `${n.ns}/${n.cap_name}`;
    if (!capToGroups[k]) capToGroups[k] = new Set();
    capToGroups[k].add(n.group);
  });

  // Resolve applicable edges
  const edges = [];
  SIGNAL_FLOWS.forEach(([fc, tc, lbl, col]) => {
    const fgs = capToGroups[fc], tgs = capToGroups[tc];
    if (!fgs || !tgs) return;
    fgs.forEach(f => tgs.forEach(t => { if (f !== t) edges.push({f, t, lbl, col}); }));
  });
  if (!edges.length) return;

  // Measure group positions relative to topo-stage
  const stageRect = stage.getBoundingClientRect();
  const groupRects = {};
  stage.querySelectorAll('[data-group]').forEach(el => {
    groupRects[el.dataset.group] = el.getBoundingClientRect();
  });

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.classList.add('edges');
  svg.setAttribute('style', 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible');

  // One arrowhead marker per colour
  const defs = document.createElementNS(NS, 'defs');
  [...new Set(edges.map(e => e.col))].forEach(col => {
    const mid = 'arr' + col.replace('#','');
    const mk = document.createElementNS(NS, 'marker');
    mk.setAttribute('id', mid);
    mk.setAttribute('markerWidth', '8'); mk.setAttribute('markerHeight', '6');
    mk.setAttribute('refX', '7');       mk.setAttribute('refY', '3');
    mk.setAttribute('orient', 'auto');
    const p = document.createElementNS(NS, 'polygon');
    p.setAttribute('points', '0 0, 8 3, 0 6');
    p.setAttribute('fill', col);
    p.setAttribute('opacity', staged ? '0.3' : '0.8');
    mk.appendChild(p); defs.appendChild(mk);
  });
  svg.appendChild(defs);

  // Detect bidirectional pairs so we can offset arrows to avoid overlap
  const edgeKeySet = new Set(edges.map(e => `${e.f}→${e.t}`));
  const biDirOffset = {};
  edges.forEach(e => {
    const rev = `${e.t}→${e.f}`;
    if (edgeKeySet.has(rev)) { biDirOffset[`${e.f}→${e.t}`] = -6; biDirOffset[rev] = +6; }
  });

  const drawn = new Set();
  edges.forEach(({f, t, lbl, col}) => {
    const fr = groupRects[f], tr = groupRects[t];
    if (!fr || !tr) return;

    const yOff = biDirOffset[`${f}→${t}`] || 0;
    const ep = edgePoints(fr, tr, stageRect);
    if (yOff) { ep.y1 += yOff; ep.y2 += yOff; ep.cp1y += yOff; ep.cp2y += yOff; ep.ly += yOff; }
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d',
      `M ${ep.x1.toFixed(1)} ${ep.y1.toFixed(1)} C ${ep.cp1x.toFixed(1)} ${ep.cp1y.toFixed(1)} ${ep.cp2x.toFixed(1)} ${ep.cp2y.toFixed(1)} ${ep.x2.toFixed(1)} ${ep.y2.toFixed(1)}`);
    path.setAttribute('stroke', col);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', staged ? '0.2' : '0.65');
    path.setAttribute('marker-end', `url(#arr${col.replace('#','')})`);
    svg.appendChild(path);

    const key = `${f}→${t}`;
    if (!drawn.has(key)) {
      drawn.add(key);
      const tx = document.createElementNS(NS, 'text');
      tx.setAttribute('x',            ep.lx.toFixed(1));
      tx.setAttribute('y',           (ep.ly - 5).toFixed(1));
      tx.setAttribute('text-anchor', 'middle');
      tx.setAttribute('font-size',   '9');
      tx.setAttribute('font-family', 'monospace');
      tx.setAttribute('fill',         col);
      tx.setAttribute('opacity',      staged ? '0.4' : '0.9');
      tx.textContent = lbl;
      svg.appendChild(tx);
    }
  });

  stage.appendChild(svg);
}

// ── Groups table ──────────────────────────────────────────────────────────────
function renderGroups(s, running) {
  const tbody = document.getElementById('groups-body');
  if (!running || !s.groups || !s.groups.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="color:var(--muted);padding:10px 14px">${
      running ? 'No groups' : 'No running mesh'}</td></tr>`;
    return;
  }
  // Count available (non-failed) spares per group:
  //   Intrinsic cap → spares with matching intrinsic_caps entry
  //   Acquirable cap → blank spares (intrinsic_caps empty)
  const allNodes = s.nodes || [];
  const blankSpares = allNodes.filter(n => n.is_spare && !n.failed && !(n.intrinsic_caps||[]).length).length;
  function sparesForGroup(g) {
    const cap = `${g.ns || ''}/${g.cap_name || ''}`;  // not in group JSON, use lookup below
    return blankSpares;  // default; overridden per-group below
  }
  // Build a cap→group map from nodes for spares lookup
  const groupCapMap = {};
  allNodes.filter(n => !n.is_spare && !n.failed).forEach(n => { groupCapMap[n.group] = `${n.ns}/${n.cap_name}`; });

  tbody.innerHTML = s.groups.map(g => `
    <tr>
      <td><strong>${esc(g.name)}</strong>${g.description
        ? `<br><span style="color:var(--muted)">${esc(g.description)}</span>` : ''}</td>
      <td>${g.actual}/${g.min_agents}</td>
      <td>${(() => {
          const cap = groupCapMap[g.name] || '';
          if (INTRINSIC_CAPS.has(cap)) {
            const n = allNodes.filter(nd => nd.is_spare && !nd.failed && (nd.intrinsic_caps||[]).includes(cap)).length;
            return `${n} <span style="color:var(--muted);font-size:9px">(intrinsic)</span>`;
          }
          return `${blankSpares} <span style="color:var(--muted);font-size:9px">(shared)</span>`;
        })()}</td>
      <td>${g.satisfied
            ? '<span class="pill ok">✓ OK</span>'
            : `<span class="pill warn">✗ DEFICIT ${g.deficit}</span>`}</td>
      <td>
        <button class="ctrl-btn stop"  onclick="groupCtrl('${esc(g.name)}','stop')">■ Stop</button>
        <button class="ctrl-btn start" onclick="groupCtrl('${esc(g.name)}','start')">▶ Start</button>
      </td>
    </tr>`).join('');
}

// ── System controls ────────────────────────────────────────────────────────────
function renderSysCtrl(s, running) {
  const el = document.getElementById('sys-ctrl');
  const parts = [];
  if (s.loaded_system) {
    const pid = nameToId(s.loaded_system);
    const lbl = idToName(pid) || s.loaded_system;
    parts.push(`<button class="sys-btn go" onclick="activateSystem()">▶ Activate: ${esc(lbl)}</button>`);
  }
  if (running) {
    parts.push(`<button class="sys-btn" style="border-color:var(--rose);color:var(--rose)" onclick="deactivateSystem()">■ Deactivate</button>`);
    parts.push(`<button class="sys-btn pause" onclick="post('/system/stop').then(poll)">⏸ Pause All</button>`);
    parts.push(`<button class="sys-btn resume" onclick="post('/system/start').then(poll)">▶ Resume All</button>`);
    if (s.system === 'llm-agent-demo')
      parts.push(`<button class="sys-btn trigger" onclick="post('/demo/trigger').then(poll)">▷ Run Task</button>`);
  }
  el.innerHTML = parts.length ? parts.join('')
    : '<span style="color:var(--muted);font-size:11px">Select a System from Library and activate it</span>';
}

// ── Event log ─────────────────────────────────────────────────────────────────
let lastLogLength = 0;
function renderLog(entries) {
  const wrap = document.getElementById('log-wrap');
  const isNew = entries.length > lastLogLength;
  lastLogLength = entries.length;

  const EVT_CLASS = {
    Provision: 'evt-provision', Spare: 'evt-spare',
    Kill: 'evt-kill', Warning: 'evt-warning',
    Promoted: 'evt-promoted', AutoHeal: 'evt-autoheal',
    Heartbeat: 'evt-heartbeat', Worker: 'evt-worker', Suppressed: 'evt-suppressed',
    Planner: 'evt-planner', FactCheck: 'evt-factcheck', Synthesizer: 'evt-synthesizer',
    Proposer: 'evt-proposer', Vote: 'evt-vote', Commit: 'evt-commit',
    Alert: 'evt-alert', State: 'evt-state', Task: 'evt-task',
    Invoking: 'evt-invoking', Result: 'evt-result',
  };

  wrap.innerHTML = entries.map((e, i) => {
    const cls = EVT_CLASS[e.event] || 'evt-default';
    const fresh = isNew && i === 0 ? ' fresh' : '';
    return `<div class="log-row${fresh}">
      <span class="log-time">${esc(e.time)}</span>
      <span class="log-evt ${cls}">${esc(e.event)}</span>
      <span class="log-detail" title="${esc(e.detail)}">${esc(e.detail)}</span>
    </div>`;
  }).join('');
}

// ── Actions ───────────────────────────────────────────────────────────────────
const nodeKill  = lbl => post(`/nodes/${enc(lbl)}/kill`).then(poll);
const nodeStart = lbl => post(`/nodes/${enc(lbl)}/start`).then(poll);
const groupCtrl = (g, a) => post(`/system/groups/${enc(g)}/${a}`).then(poll);
const loadSystem       = id => post(`/manifests/${enc(id)}/load`).then(poll);
const activateSystem   = ()  => post('/system/activate').then(() => setTimeout(poll, 800));
const deactivateSystem = ()  => post('/system/deactivate').then(poll);

async function uploadManifest() {
  const body = document.getElementById('mta').value.trim();
  const msg  = document.getElementById('umsg');
  if (!body) { msg.className='umsg err'; msg.textContent='Nothing to upload'; return; }
  try {
    const r = await post('/manifest', body);
    if (r.ok) { msg.className='umsg ok'; msg.textContent=`✓ v${r.version} active`; poll(); }
    else       { msg.className='umsg err'; msg.textContent=`✗ ${r.error||'rejected'}`; }
  } catch(e) { msg.className='umsg err'; msg.textContent=`✗ ${e.message}`; }
}

// ── System library bar ────────────────────────────────────────────────────────
async function loadLibrary() {
  const bar = document.getElementById('system-bar');
  try {
    cachedPresets = await get('/library');
    bar.innerHTML = cachedPresets.map(p =>
      `<button class="system-btn" data-pid="${esc(p.id)}"
               title="${esc(p.description)}"
               onclick="loadSystem('${esc(p.id)}')">${esc(p.name)}</button>`
    ).join('');
  } catch(e) { bar.textContent = 'Failed to load system library'; }
}

async function poll() {
  try { renderState(await get('/state')); }
  catch(e) { console.warn('poll failed', e); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function nameToId(meshName) {
  const map = {
    'llm-agent-demo':    'llm-agent',
    'signal-suppress':   'signal-suppress',
    'multi-agent-mesh':  'multi-agent-mesh',
    'consensus-cluster': 'consensus-cluster',
    'watchdog-cluster':  'watchdog-cluster',
    'dispatch-pool':     'dispatch-pool',
    'epidemic-ring':     'epidemic-ring',
    'minimal-mesh':      'minimal',
    'emergent-pool':     'emergent-pool',
    'capability-market': 'capability-market',
    'locality-mesh':     'locality-mesh',
  };
  return map[meshName] || null;
}
function idToName(id) { const p = cachedPresets.find(p => p.id === id); return p ? p.name : null; }
const enc = s => encodeURIComponent(s);
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                         .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── File → textarea ───────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function() {
  const f = this.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => { document.getElementById('mta').value = e.target.result; document.getElementById('umsg').textContent=''; };
  r.readAsText(f);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
loadLibrary();
poll();
setInterval(poll, 3000);
