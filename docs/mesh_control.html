<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium — Mesh Control</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #f8fafc;
    --panel:      #ffffff;
    --border:     #e2e8f0;
    --border-mid: rgba(0,0,0,0.08);
    --text:       #0f172a;
    --muted:      #64748b;
    --light:      #94a3b8;

    --emerald:    #059669;
    --emerald-bg: #d1fae5;
    --emerald-bd: #a7f3d0;
    --rose:       #e11d48;
    --rose-bg:    #ffe4e6;
    --rose-bd:    #fecdd3;
    --amber:      #d97706;
    --amber-bg:   #fef3c7;
    --amber-bd:   #fde68a;
    --slate:      #475569;
    --slate-bg:   #f1f5f9;
    --slate-bd:   #e2e8f0;
    --violet:     #7c3aed;
    --violet-bg:  #ede9fe;
    --violet-bd:  #c4b5fd;

    --radius:     6px;
    --radius-lg:  10px;
    --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:  0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 40;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-mid);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
  }
  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--emerald);
    flex-shrink: 0;
  }
  .header-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
  .mesh-name  { color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .refresh-indicator {
    font-size: 10px;
    color: var(--light);
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  /* ── Pill / badge ── */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    line-height: 1.4;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pill.ok      { background: var(--emerald-bg); color: var(--emerald); border-color: var(--emerald-bd); }
  .pill.deficit { background: var(--rose-bg);    color: var(--rose);    border-color: var(--rose-bd); }
  .pill.stopped { background: var(--amber-bg);   color: var(--amber);   border-color: var(--amber-bd); }
  .pill.neutral { background: var(--slate-bg);   color: var(--slate);   border-color: var(--slate-bd); }
  .pill.mgr     { background: var(--violet-bg);  color: var(--violet);  border-color: var(--violet-bd); }

  /* ── Layout ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Card / panel ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .card-body { padding: 14px 16px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: var(--radius);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-stop    { background: var(--rose-bg);    color: var(--rose);    border-color: var(--rose-bd); }
  .btn-start   { background: var(--emerald-bg); color: var(--emerald); border-color: var(--emerald-bd); }
  .btn-upload  { background: var(--slate-bg);   color: var(--slate);   border-color: var(--slate-bd); }
  .btn-apply   { background: var(--violet-bg);  color: var(--violet);  border-color: var(--violet-bd); }
  .btn-stop:hover:not(:disabled)   { background: #fecdd3; }
  .btn-start:hover:not(:disabled)  { background: #a7f3d0; }
  .btn-upload:hover:not(:disabled) { background: #e2e8f0; }
  .btn-apply:hover:not(:disabled)  { background: #ddd6fe; }
  .btn-sm { padding: 3px 8px; font-size: 10px; }

  /* ── System actions row ── */
  .system-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── Groups table ── */
  .groups-table { width: 100%; border-collapse: collapse; }
  .groups-table th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--light);
    padding: 0 8px 8px;
    border-bottom: 1px solid var(--border);
  }
  .groups-table th:first-child { padding-left: 0; }
  .groups-table td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--bg);
    vertical-align: middle;
  }
  .groups-table td:first-child { padding-left: 0; }
  .groups-table tr:last-child td { border-bottom: none; }
  .group-name { font-weight: 500; font-size: 12px; }
  .group-desc { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .count-cell { font-variant-numeric: tabular-nums; }
  .count-sep  { color: var(--light); }
  .controls-cell { display: flex; gap: 4px; }

  /* ── Preset grid ── */
  .presets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 10px;
  }
  .preset-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .preset-card:hover { border-color: var(--violet-bd); box-shadow: 0 0 0 3px var(--violet-bg); }
  .preset-name { font-weight: 600; font-size: 12px; }
  .preset-desc { font-size: 10px; color: var(--muted); line-height: 1.4; flex: 1; }
  .preset-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .preset-ver { font-size: 10px; color: var(--light); font-variant-numeric: tabular-nums; }
  .preset-status { font-size: 10px; color: var(--muted); min-height: 14px; }

  /* ── Live view ── */
  .node-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .node-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .node-card.dead { opacity: 0.55; }
  .node-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .node-label { font-weight: 700; font-size: 13px; letter-spacing: -0.01em; }
  .node-state { font-size: 10px; font-weight: 600; padding: 1px 7px;
                border-radius: 99px; white-space: nowrap; }
  .node-state.idle       { background: var(--slate-bg);   color: var(--slate);   }
  .node-state.ready      { background: var(--emerald-bg); color: var(--emerald); }
  .node-state.running    { background: var(--emerald-bg); color: var(--emerald); }
  .node-state.planning   { background: var(--violet-bg);  color: var(--violet);  }
  .node-state.invoking   { background: var(--amber-bg);   color: var(--amber);   }
  .node-state.reflecting { background: var(--amber-bg);   color: var(--amber);   }
  .node-state.done       { background: var(--emerald-bg); color: var(--emerald); }
  .node-state.paused     { background: var(--amber-bg);   color: var(--amber);   }
  .node-state.offline    { background: var(--slate-bg);   color: var(--light);   }
  .node-state.failed     { background: var(--rose-bg);    color: var(--rose);    }
  .node-section-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--light); margin-top: 4px;
  }
  .node-tag-row { display: flex; flex-wrap: wrap; gap: 3px; min-height: 16px; }
  .node-tag {
    font-size: 10px; padding: 1px 6px;
    border-radius: 4px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); white-space: nowrap;
  }
  .last-call-row {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 11px; line-height: 1.4;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .last-call-label { color: var(--light); flex-shrink: 0; }
  .last-call-name  { font-weight: 600; color: var(--violet); flex-shrink: 0; }
  .last-call-sep   { color: var(--light); flex-shrink: 0; }
  .last-call-result{ color: var(--muted); font-family: "SFMono-Regular",Menlo,monospace;
                     font-size: 10px; overflow: hidden; text-overflow: ellipsis;
                     white-space: nowrap; }

  /* ── Upload section ── */
  .upload-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .file-label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.12s;
  }
  .file-label:hover { background: var(--bg); }
  #file-input { display: none; }
  .file-name { font-size: 11px; color: var(--muted); font-style: italic; }

  textarea {
    width: 100%;
    font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 11px;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    resize: vertical;
    min-height: 140px;
    outline: none;
  }
  textarea:focus { border-color: #94a3b8; box-shadow: 0 0 0 2px rgba(148,163,184,0.2); }

  .upload-status {
    margin-top: 8px;
    font-size: 11px;
    min-height: 18px;
    transition: color 0.15s;
  }
  .upload-status.ok      { color: var(--emerald); }
  .upload-status.err     { color: var(--rose); }
  .upload-status.pending { color: var(--muted); }

  /* ── Log ── */
  .log-list { display: flex; flex-direction: column; gap: 2px; max-height: 200px; overflow-y: auto; }
  .log-row { display: flex; gap: 8px; font-size: 11px; padding: 2px 0; }
  .log-time { color: var(--light); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .log-event{ color: var(--muted); font-weight: 500; flex-shrink: 0; min-width: 72px; }
  .log-detail{ color: var(--text); }

  /* ── Empty state ── */
  .empty { color: var(--light); font-size: 11px; font-style: italic; padding: 8px 0; }

  /* ── Redirect banner ── */
  #redirect-banner {
    display: none;
    position: fixed;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--violet); color: #fff;
    padding: 8px 20px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    box-shadow: var(--shadow-md);
    z-index: 100;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-dot" id="health-dot"></div>
      mycelium
    </div>
    <div class="header-sep"></div>
    <span class="mesh-name" id="mesh-name">—</span>
    <span id="mesh-version" class="pill neutral" style="font-size:10px;padding:1px 6px;">—</span>
    <span id="health-pill" class="pill neutral">—</span>
    <span id="manager-pill" class="pill mgr" style="display:none;">—</span>
    <div class="header-right">
      <span class="refresh-indicator" id="refresh-indicator">&#8635; polling</span>
    </div>
  </div>
</header>

<!-- Auto-redirect banner -->
<div id="redirect-banner">Manager changed — redirecting&hellip;</div>

<div class="main">

  <!-- Live View -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Live</span>
      <span id="live-call-count" style="font-size:10px;color:var(--muted);"></span>
    </div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">
      <div class="node-grid" id="node-grid">
        <div class="empty">Connecting&hellip;</div>
      </div>
      <div id="last-call-row" style="display:none;" class="last-call-row">
        <span class="last-call-label">Last:</span>
        <span class="last-call-name" id="last-call-name"></span>
        <span class="last-call-sep">&rarr;</span>
        <span class="last-call-result" id="last-call-result"></span>
      </div>
    </div>
  </div>

  <!-- System Controls -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">System</span>
    </div>
    <div class="card-body">
      <div class="system-actions">
        <button class="btn btn-stop"  onclick="systemAction('stop')">&#9632; Stop System</button>
        <button class="btn btn-start" onclick="systemAction('start')">&#9654; Start System</button>
        <span id="system-action-status" style="font-size:11px;color:var(--muted);"></span>
      </div>
    </div>
  </div>

  <!-- Groups -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Groups</span>
      <span id="groups-summary" style="font-size:10px;color:var(--muted);"></span>
    </div>
    <div class="card-body" style="padding:0 16px;">
      <table class="groups-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Agents</th>
            <th>Status</th>
            <th>Controls</th>
          </tr>
        </thead>
        <tbody id="groups-tbody">
          <tr><td colspan="4" class="empty" style="padding:14px 0;">Loading&hellip;</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Preset Gallery -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Examples / Presets</span>
      <span style="font-size:10px;color:var(--muted);">Apply a topology and it propagates to all nodes</span>
    </div>
    <div class="card-body">
      <div class="presets-grid" id="presets-grid">
        <div class="empty">Loading presets&hellip;</div>
      </div>
    </div>
  </div>

  <!-- Upload Manifest -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Upload Manifest</span>
    </div>
    <div class="card-body">
      <div class="upload-row">
        <label class="file-label" for="file-input">
          &#128196; Choose file
        </label>
        <input type="file" id="file-input" accept=".toml,text/plain" onchange="onFileChosen(event)">
        <span class="file-name" id="file-name">No file chosen</span>
      </div>
      <textarea id="manifest-textarea" placeholder="# Paste or load a TOML manifest here&#10;[mesh]&#10;name    = &quot;...&quot;&#10;version = &quot;0.2&quot;&#10;&#10;[[group]]&#10;..."></textarea>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
        <button class="btn btn-upload" onclick="uploadManifest()">&#8593; Upload</button>
        <div class="upload-status" id="upload-status"></div>
      </div>
    </div>
  </div>

  <!-- Event Log -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Event Log</span>
    </div>
    <div class="card-body" style="padding:8px 16px;">
      <div class="log-list" id="log-list">
        <div class="empty">No events yet.</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let lastManagerPort = null;
let redirecting     = false;

// ── Polling ───────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const [statusRes, stateRes] = await Promise.all([
      fetch('/system/status'),
      fetch('/state').catch(() => null),
    ]);
    const status = await statusRes.json();
    renderStatus(status);
    checkManagerRedirect(status);

    if (stateRes && stateRes.ok) {
      const state = await stateRes.json();
      if (state.log) renderLog(state.log);
      renderLive(state);
    }

    // Refresh mesh name/version from manifest
    fetch('/manifest').then(r => r.ok ? r.json() : null).then(m => {
      if (!m) return;
      document.getElementById('mesh-name').textContent = m.name || '—';
      const vPill = document.getElementById('mesh-version');
      vPill.textContent = m.version ? 'v' + m.version : '—';
    }).catch(() => {});

    document.getElementById('refresh-indicator').textContent = '↺ ' + fmtTime(Date.now());
  } catch (e) {
    document.getElementById('refresh-indicator').textContent = '⚠ offline';
  }
}

function startPolling() {
  poll();
  setInterval(poll, 3000);
}

// ── Manager redirect ──────────────────────────────────────────────────────────
// When the gossip mesh elects a new manager, the browser auto-follows to the
// new port so the user always sees the manager's authoritative view.
function checkManagerRedirect(status) {
  if (redirecting) return;
  const mp = status.manager_port;
  if (!mp) return;
  const myPort = parseInt(window.location.port, 10) || 80;
  if (mp !== myPort) {
    redirecting = true;
    document.getElementById('redirect-banner').style.display = 'block';
    // Short delay so the banner is visible before navigation
    setTimeout(() => {
      window.location.href = 'http://' + window.location.hostname + ':' + mp + '/';
    }, 800);
  }
}

// ── Render helpers ────────────────────────────────────────────────────────────
function renderStatus(status) {
  const healthy = status.healthy;

  // Health pill
  const dot = document.getElementById('health-dot');
  const pill = document.getElementById('health-pill');
  dot.style.background = healthy ? 'var(--emerald)' : 'var(--rose)';
  pill.className = 'pill ' + (healthy ? 'ok' : 'deficit');
  pill.textContent = healthy ? '● HEALTHY' : '● DEGRADED';

  // Manager pill
  const mgr = document.getElementById('manager-pill');
  if (status.manager_node) {
    mgr.style.display = '';
    mgr.textContent = '★ mgr: ' + status.manager_node;
  } else {
    mgr.style.display = 'none';
  }

  // Groups summary
  const satisfied = status.groups.filter(g => g.satisfied).length;
  document.getElementById('groups-summary').textContent =
    satisfied + '/' + status.groups.length + ' groups satisfied';

  // Groups table
  const tbody = document.getElementById('groups-tbody');
  if (!status.groups.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty" style="padding:14px 0;">No groups defined.</td></tr>';
    return;
  }
  tbody.innerHTML = status.groups.map(g => {
    const cls   = g.satisfied ? 'ok' : 'deficit';
    const label = g.satisfied ? '✓ OK' : '✗ DEFICIT';
    const maxStr = g.max_agents != null ? '/' + g.max_agents : '';
    return `<tr>
      <td>
        <div class="group-name">${esc(g.name)}</div>
        ${g.description ? `<div class="group-desc">${esc(g.description)}</div>` : ''}
      </td>
      <td class="count-cell">
        <span style="font-weight:600;">${g.actual}</span>
        <span class="count-sep"> / </span>
        <span>${g.min_agents}${maxStr}</span>
      </td>
      <td><span class="pill ${cls}">${label}</span></td>
      <td>
        <div class="controls-cell">
          <button class="btn btn-stop btn-sm"  onclick="groupAction('${esc(g.name)}','stop')">&#9632;</button>
          <button class="btn btn-start btn-sm" onclick="groupAction('${esc(g.name)}','start')">&#9654;</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── Live view ─────────────────────────────────────────────────────────────────
function renderLive(state) {
  if (!state) return;

  // Node grid
  const grid = document.getElementById('node-grid');
  if (state.nodes && state.nodes.length) {
    grid.innerHTML = state.nodes.map(n => {
      const stateRaw  = n.state || 'Ready';
      const stateKey  = stateRaw.toLowerCase().split(/[\s:]/)[0];
      const stateLabel = stateRaw.includes(':')
        ? stateRaw.split(':')[0] + ' ' + stateRaw.split(':')[1]
        : stateRaw;
      const caps = (n.caps || []).map(c =>
        `<span class="node-tag">${esc(c.ns)}/${esc(c.name)}</span>`
      ).join('');
      const tools = (n.tools || []).map(t =>
        `<span class="node-tag">${esc(t)}</span>`
      ).join('');
      return `<div class="node-card${n.alive ? '' : ' dead'}">
        <div class="node-header">
          <span class="node-label">${esc(n.label)}</span>
          <span class="node-state ${stateKey}">${esc(stateLabel)}</span>
        </div>
        ${caps ? `<div class="node-section-label">Capabilities</div><div class="node-tag-row">${caps}</div>` : ''}
        ${tools ? `<div class="node-section-label">Tools</div><div class="node-tag-row">${tools}</div>` : ''}
      </div>`;
    }).join('');
  }

  // Call counter
  const cc = document.getElementById('live-call-count');
  if (state.total_calls != null)
    cc.textContent = state.total_calls + ' tool call' + (state.total_calls !== 1 ? 's' : '');

  // Last tool call
  const row = document.getElementById('last-call-row');
  if (state.last_tool) {
    row.style.display = 'flex';
    document.getElementById('last-call-name').textContent = state.last_tool;
    const res = state.last_result;
    document.getElementById('last-call-result').textContent =
      res && typeof res === 'object' ? JSON.stringify(res) : (res || '—');
  }
}

function renderLog(entries) {
  const el = document.getElementById('log-list');
  if (!entries.length) { el.innerHTML = '<div class="empty">No events yet.</div>'; return; }
  el.innerHTML = entries.slice(0, 30).map(e =>
    `<div class="log-row">
      <span class="log-time">${esc(e.time)}</span>
      <span class="log-event">${esc(e.event)}</span>
      <span class="log-detail">${esc(e.detail)}</span>
    </div>`
  ).join('');
}

// ── Preset gallery ────────────────────────────────────────────────────────────
async function loadPresets() {
  try {
    const r = await fetch('/presets');
    if (!r.ok) return;
    const presets = await r.json();
    const grid = document.getElementById('presets-grid');
    if (!presets.length) { grid.innerHTML = '<div class="empty">No presets available.</div>'; return; }
    grid.innerHTML = presets.map(p => `
      <div class="preset-card" id="preset-card-${esc(p.id)}">
        <div class="preset-name">${esc(p.name)}</div>
        <div class="preset-desc">${esc(p.description)}</div>
        <div class="preset-footer">
          <span class="preset-ver">v${esc(p.version)}</span>
          <button class="btn btn-apply btn-sm" onclick="applyPreset('${esc(p.id)}')">Apply</button>
        </div>
        <div class="preset-status" id="preset-status-${esc(p.id)}"></div>
      </div>`
    ).join('');
  } catch (e) {
    document.getElementById('presets-grid').innerHTML =
      '<div class="empty">Could not load presets.</div>';
  }
}

async function applyPreset(id) {
  const statusEl = document.getElementById('preset-status-' + id);
  if (statusEl) { statusEl.textContent = 'Applying…'; statusEl.style.color = 'var(--muted)'; }
  try {
    const r = await fetch('/presets/' + encodeURIComponent(id) + '/apply', { method: 'POST' });
    const j = await r.json();
    if (r.ok) {
      if (statusEl) { statusEl.textContent = '✓ Applied as v' + j.version; statusEl.style.color = 'var(--emerald)'; }
      setTimeout(poll, 500);
    } else {
      if (statusEl) { statusEl.textContent = '✗ ' + (j.error || 'Error'); statusEl.style.color = 'var(--rose)'; }
    }
  } catch (e) {
    if (statusEl) { statusEl.textContent = '✗ Request failed'; statusEl.style.color = 'var(--rose)'; }
  }
  if (statusEl) setTimeout(() => { statusEl.textContent = ''; }, 4000);
}

// ── System / group actions ────────────────────────────────────────────────────
async function systemAction(action) {
  const el = document.getElementById('system-action-status');
  el.textContent = action === 'stop' ? 'Stopping…' : 'Starting…';
  el.style.color = 'var(--muted)';
  try {
    const r = await fetch('/system/' + action, { method: 'POST' });
    const j = await r.json();
    if (r.ok) {
      el.textContent = action === 'stop'
        ? 'Stopped — capabilities will tombstone within 10 s'
        : 'Started — capabilities will re-advertise within 10 s';
      el.style.color = 'var(--emerald)';
    } else {
      el.textContent = '✗ ' + (j.error || 'Error');
      el.style.color = 'var(--rose)';
    }
  } catch (e) {
    el.textContent = '✗ Request failed';
    el.style.color = 'var(--rose)';
  }
  setTimeout(poll, 500);
}

async function groupAction(name, action) {
  try {
    await fetch('/system/groups/' + encodeURIComponent(name) + '/' + action, { method: 'POST' });
    setTimeout(poll, 500);
  } catch (e) {}
}

// ── Manifest upload ───────────────────────────────────────────────────────────
function onFileChosen(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('manifest-textarea').value = ev.target.result; };
  reader.readAsText(file);
}

async function uploadManifest() {
  const body = document.getElementById('manifest-textarea').value.trim();
  const status = document.getElementById('upload-status');
  if (!body) { status.textContent = 'Paste a TOML manifest first.'; status.className = 'upload-status err'; return; }

  status.textContent = 'Uploading…';
  status.className = 'upload-status pending';
  try {
    const r = await fetch('/manifest', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body,
    });
    const j = await r.json();
    if (r.ok) {
      status.textContent = '✓ Accepted — v' + j.version + ' now active';
      status.className = 'upload-status ok';
      setTimeout(poll, 500);
    } else {
      status.textContent = '✗ ' + (j.error || 'Upload failed');
      status.className = 'upload-status err';
    }
  } catch (e) {
    status.textContent = '✗ Request failed — is the node running?';
    status.className = 'upload-status err';
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function fmtTime(ms) {
  return new Date(ms).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── Boot ──────────────────────────────────────────────────────────────────────
startPolling();
loadPresets();
</script>
