[package]
name = "mycelium"
version = "0.1.0"
edition = "2021"
rust-version = "1.76"
authors = ["mycelium contributors"]
description = "Gossip protocol implementation with resource management"
license = "MIT OR Apache-2.0"
repository = "https://github.com/RichardEko/mycelium"
readme = "README.md"
keywords = ["distributed-systems", "gossip", "p2p", "protocol"]
categories = ["network-programming", "asynchronous"]

[features]
default = ["cli"]
cli = ["dep:tracing-subscriber"]
# Exposes the `fuzz_internals` module re-exporting internal decoders to the
# cargo-fuzz harness under `fuzz/`. NOT part of the stable public API — only
# enable when building fuzz targets.
fuzz-internals = []

# The `fuzz/` directory is its own cargo-fuzz crate; keep it out of any
# implicit-workspace traversal from this parent manifest.
[workspace]
exclude = ["fuzz"]

[dependencies]
# Core
tokio = { version = "1.35", features = ["full", "test-util"] }
fastrand = "2"

# Data structures
dashmap = "5.4"
papaya = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive", "rc"] }
ahash = "0.8"
bincode = { version = "2", features = ["serde"] }
bytes = { version = "1", features = ["serde"] }
toml = "0.7"

# TCP keepalive configuration (unix only)
socket2 = "0.5"

# Synchronization
parking_lot = "0.12"

# Error handling
thiserror = "1.0"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }

# HTTP server (Layer 3 — embedded gateway for MCP bridge and language bridges)
axum         = "0.8"
tower-http   = { version = "0.6", features = ["cors"] }
tokio-stream = { version = "0.1", features = ["sync"] }
serde_json   = "1.0"
futures-util = "0.3"
base64       = "0.22"
# HTTP client — used by MCP client role (connect_mcp_server) at library runtime
reqwest      = { version = "0.12", features = ["json"] }

[dev-dependencies]
tokio        = { version = "1.35", features = ["full"] }
criterion    = { version = "0.5", features = ["async_tokio"] }
libc         = "0.2"
wgpu         = "22"
pollster     = "0.3"
bytemuck     = { version = "1", features = ["derive"] }
async-openai = "0.28"

[[bench]]
name    = "throughput"
harness = false

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
panic = "abort"
incremental = false
