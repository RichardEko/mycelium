# Minimal skill for smoke testing.
# Requires Ollama (or any OpenAI-compatible server) running locally.
#
# Usage:
#   ollama pull llama3.2
#   cargo build --bin skillrunner
#   ./target/debug/skillrunner --skill examples/skills/hello.skill.toml

[node]
bind_address    = "127.0.0.1"
bind_port       = 7950
bootstrap_peers = []    # standalone for smoke testing; add peers to join a cluster

[capability]
ns          = "llm"
name        = "hello"
description = "Responds to a greeting with a short reply"
ttl_secs    = 60

[capability.input]
type     = "object"
required = ["message"]
[capability.input.properties]
message = { type = "string", description = "The user's message" }

[capability.output]
type = "object"
[capability.output.properties]
reply = { type = "string", description = "The assistant's reply" }

[capability.policy]
max_concurrent = 4
authorized_callers = []    # unrestricted

[skill]
prompt = """
You are a friendly assistant. Respond briefly (1–2 sentences).
Return your reply as JSON: {"reply": "<your response>"}
"""
tools = []    # no sub-skills needed

[skill.llm]
endpoint    = "http://localhost:11434/v1"
model       = "llama3.2"
api_key     = ""
max_tokens  = 256
temperature = 0.7
