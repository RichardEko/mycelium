[mesh]
name    = "dispatch-pool"
version = "0.1"

[[group]]
name        = "fast-workers"
description = "Low-latency task workers (150–180 ms/task)"
min_agents  = 2
max_agents  = 6

  [[group.capability]]
  ns   = "compute"
  name = "cpu"

[[group]]
name        = "slow-workers"
description = "High-throughput task workers (680–750 ms/task)"
min_agents  = 2
max_agents  = 4

  [[group.capability]]
  ns   = "compute"
  name = "cpu-heavy"

[[group]]
name        = "dispatchers"
description = "Adaptive routers — balance load across worker pool"
min_agents  = 1
max_agents  = 2

  [[group.capability]]
  ns   = "routing"
  name = "dispatcher"
