[mesh]
name    = "capability-market"
version = "0.1"

[[group]]
name        = "gpu-compute"
description = "GPU accelerators — high-demand, scarce resource"
min_agents  = 2
max_agents  = 5

  [[group.capability]]
  ns   = "compute"
  name = "gpu"

[[group]]
name        = "cpu-compute"
description = "General-purpose CPU workers"
min_agents  = 3
max_agents  = 6

  [[group.capability]]
  ns   = "compute"
  name = "cpu"

[[group]]
name        = "storage"
description = "Disk-backed storage nodes"
min_agents  = 1
max_agents  = 4

  [[group.capability]]
  ns   = "storage"
  name = "disk"

[[group]]
name        = "ai-agents"
description = "Autonomous AI agent nodes"
min_agents  = 2
max_agents  = 4

  [[group.capability]]
  ns   = "ai"
  name = "agent"
