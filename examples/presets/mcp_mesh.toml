[mesh]
name    = "multi-agent-mesh"
version = "0.1"

[[group]]
name        = "planners"
description = "Planning agents — decompose goals and delegate sub-tasks via gossip RPC"
min_agents  = 1
max_agents  = 2

  [[group.capability]]
  ns   = "reasoning"
  name = "planner"

[[group]]
name        = "fact-checkers"
description = "Verification agents — receive delegated claims, return evidence or refutation"
min_agents  = 1
max_agents  = 2

  [[group.capability]]
  ns   = "reasoning"
  name = "fact-checker"

[[group]]
name        = "synthesizers"
description = "Synthesis agents — aggregate outputs from planners and fact-checkers into a final result"
min_agents  = 1
max_agents  = 2

  [[group.capability]]
  ns   = "reasoning"
  name = "synthesizer"
