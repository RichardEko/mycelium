[mesh]
name    = "consensus-cluster"
version = "0.1"

[[group]]
name        = "voters"
description = "Ballot participants — quorum required for commit"
min_agents  = 3
max_agents  = 7

  [[group.capability]]
  ns   = "consensus"
  name = "voter"

[[group]]
name        = "proposers"
description = "Rotating proposers — one active per round"
min_agents  = 1
max_agents  = 3

  [[group.capability]]
  ns   = "consensus"
  name = "proposer"
