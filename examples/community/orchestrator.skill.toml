# Orchestrator skill — given a topic, coordinates researcher + writer to
# produce a finished article. Demonstrates skill composition: this skill
# calls two other skills as tools.
#
# Part of the 3-skill community example. Start with start.sh.

[node]
bind_address    = "127.0.0.1"
bind_port       = 7950
bootstrap_peers = []   # orchestrator is the seed node; others bootstrap off it
http_port       = 9050  # optional: enables HTTP gateway for Python/curl access

[capability]
ns          = "llm"
name        = "orchestrator"
description = "Coordinates research and writing to produce articles on any topic"
ttl_secs    = 60

[capability.input]
type     = "object"
required = ["topic"]
[capability.input.properties]
topic      = { type = "string", description = "Topic to write about" }
style      = { type = "string", enum = ["technical", "casual", "executive"] }
max_points = { type = "integer", description = "Max research findings (default 5)" }

[capability.output]
type = "object"
[capability.output.properties]
title   = { type = "string" }
article = { type = "string" }
tldr    = { type = "string" }

[capability.policy]
max_concurrent = 4
authorized_callers = []   # open to any caller

[skill]
prompt = """
You are an editorial orchestrator. You have two tools: researcher and writer.

To answer the user's request:
1. Call researcher with {"topic": "<the topic>"} to get research findings.
2. Call writer with the researcher's output to get a finished article.
3. Return the writer's response.

Always call both tools. Never write the article yourself.
"""
tools = ["llm/researcher", "llm/writer"]

[skill.llm]
endpoint    = "http://localhost:11434/v1"
model       = "llama3.2"
api_key     = ""
max_tokens  = 512
temperature = 0.1
