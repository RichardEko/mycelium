name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: RUSTSEC advisories land without any code change (M2 Run-19
    # found two applicable advisories that no push-triggered gate could
    # have caught). Monday 06:00 UTC.
    - cron: '0 6 * * 1'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      # Socket-binding suites go through the flake tier (scripts/ci-retest.sh): a wall-clock
      # flake no longer reds main, but every flake is a loud annotation — never silent.
      - run: ./scripts/ci-retest.sh --lib
      - run: ./scripts/ci-retest.sh --lib --features tls,metrics,a2a,llm
      # mycelium-core (the substrate: codec/framing/hlc/store/swim) — its unit suite was
      # clippy-COMPILED (`clippy -p mycelium-core --lib --tests`) but never RUN: `--lib` above
      # tests only the root `mycelium` package (core is a compiled dependency there, so its
      # `#[cfg(test)]` code is invisible). Same class of gap as the mini-fuzz below (M2 Run-20).
      # Includes the wire back-compat gate (`decode_wire_v11_*`) — the rolling-upgrade contract.
      - run: ./scripts/ci-retest.sh -p mycelium-core
      # In-suite decoder mini-fuzz (gated behind fuzz-internals). The fuzz/
      # targets existed for the whole project's life but were never executed
      # in CI, and an unbounded-allocation decode DoS sat uncaught (M2 Run-20).
      - run: cargo test --lib --features fuzz-internals mini_fuzz_decoders_survive_adversarial_bytes
      - run: ./scripts/ci-retest.sh -p mycelium-tuple-space --features gateway
      # Examples are the documented contract for the guide chapters; an
      # examples-free CI let a stale include_str! path hide behind cargo's
      # incremental cache for weeks (mesh_demo manifests/ → presets/ rename).
      - run: cargo build --examples --features tls,metrics,a2a,llm

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Full feature matrix — `--lib --tests` alone misses code behind
      # #[cfg(feature = "tls")] etc. (same set CLAUDE.md mandates locally).
      - run: cargo clippy --lib --tests --features tls,metrics,a2a,llm -- -D warnings
      - run: cargo clippy -p mycelium-tuple-space --features gateway --all-targets -- -D warnings

  embedded:
    name: Gateway-free build (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --no-default-features -- -D warnings

  wasm-host:
    # WS-E M12 companion crate. Its own job: it pulls wasmtime (large first
    # build; rust-cache amortises it) and runs in parallel so it never blocks
    # the main test/clippy jobs. wasmtime is confined here — never in mycelium /
    # mycelium-core (the WS-A dep-tree invariant).
    name: WASM host (WS-E M12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/ci-retest.sh -p mycelium-wasm-host
      - run: cargo clippy -p mycelium-wasm-host --all-targets -- -D warnings

  agentfacts:
    # WS-F M16-A companion crate (self-certified AgentFacts emission). Public-API
    # only; its own job for parallelism + caching.
    name: AgentFacts (WS-F M16-A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/ci-retest.sh -p mycelium-agentfacts
      - run: cargo clippy -p mycelium-agentfacts --all-targets -- -D warnings

  blackboard:
    # WS-G G3 companion crate (claim-by-predicate shared working memory). Public-API
    # only; its own job for parallelism + caching.
    name: Blackboard (WS-G G3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/ci-retest.sh -p mycelium-blackboard --features gateway
      - run: cargo clippy -p mycelium-blackboard --features gateway --all-targets -- -D warnings
      # The community-microgrid worked example (rd shared / in competitive), Docker-free.
      - run: ./mycelium-blackboard/ci_smoke.sh

  wiki:
    # Group-scoped LLM-curated wiki companion crate. Phase 1 = the data plane (Store trait +
    # FsStore), Mycelium-agnostic; the control plane (curator role + failover) is a later feature.
    name: Wiki (data plane)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/ci-retest.sh -p mycelium-wiki
      - run: cargo clippy -p mycelium-wiki --all-targets -- -D warnings
      # Phase 2 — the Mycelium control plane (curator election + failover, single-writer apply).
      - run: ./scripts/ci-retest.sh -p mycelium-wiki --features control-plane
      - run: cargo clippy -p mycelium-wiki --features control-plane --all-targets -- -D warnings
      # Phase 3 — the LLM curator (the 3-way reconcile; the EchoBackend test proves the backend wiring).
      - run: ./scripts/ci-retest.sh -p mycelium-wiki --features llm
      - run: cargo clippy -p mycelium-wiki --features llm --all-targets -- -D warnings
      # Phase 4 remainder — the HTTP gateway edge (/gateway/wiki/*), the path the Python/TS SDKs speak.
      - run: ./scripts/ci-retest.sh -p mycelium-wiki --features gateway
      - run: cargo clippy -p mycelium-wiki --features gateway --all-targets -- -D warnings
      # Phase 5 — the worked example: import documents → curator applies → a reader chat-agent answers
      # grounded in the wiki, over both use-case corpora (UC1 org twin + UC2 council). Docker-free.
      - run: ./mycelium-wiki/ci_smoke.sh

  reason:
    # v3.0 Tier-3 companion crate (docs/plans/mycelium-reason.md): capability-routed
    # inference, fleet-reasoning traces, artifact-aware resume, plus the content-addressed
    # blob tier + /gateway/reason routes the Python LangGraph checkpointer consumes.
    # Public-API only; its own job for parallelism + caching.
    name: Reason (v3.0 Tier-3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Cross-node integration suites bind real sockets — route through the flake tier.
      - run: ./scripts/ci-retest.sh -p mycelium-reason --features llm
      - run: ./scripts/ci-retest.sh -p mycelium-reason --features llm,gateway
      - run: cargo clippy -p mycelium-reason --all-targets -- -D warnings
      - run: cargo clippy -p mycelium-reason --features llm,gateway --all-targets -- -D warnings
      # The fleet-reasoning worked example (all three wedges, three-node mesh), Docker-free.
      - run: ./mycelium-reason/ci_smoke.sh

  guardrails:
    # v3.0 guardrails companion (docs/plans/mycelium-guardrails.md), PR 1 — the ergonomic,
    # self-imposed, tier-labelled policy API: one declaration compiled to boundary + AgentPolicy +
    # authorized_callers, with the Tier-C denial sealed into the tamper-evident chain (compliance).
    # Public-API only; its own job for parallelism + caching.
    name: Guardrails (v3.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Cross-node integration suites bind real sockets — route through the flake tier.
      - run: ./scripts/ci-retest.sh -p mycelium-guardrails
      - run: ./scripts/ci-retest.sh -p mycelium-guardrails --features compliance
      - run: cargo clippy -p mycelium-guardrails --all-targets -- -D warnings
      - run: cargo clippy -p mycelium-guardrails --features compliance --all-targets -- -D warnings
      # PR 2 — the guardrail-wedge worked example + policy-audit verification tool: an unauthorized
      # agent structurally stopped at the provider gate, with a tamper-evident cryptographic proof
      # reconstructed by a neutral observer node (honest framing — provable-stopping, not global).
      - run: ./mycelium-guardrails/ci_smoke.sh

  python-sdk:
    # The repo's first Python CI job: mycelium-py (call_typed) + the LangGraph
    # checkpointer, run as real integration tests against a two-node reason mesh
    # (the reason_node example) — node B resumes what node A checkpointed.
    name: Python SDK + LangGraph checkpointer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p mycelium-reason --features llm,gateway --example reason_node
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Start reason nodes (A + B, meshed)
        run: |
          mkdir -p "$RUNNER_TEMP/blobs-a" "$RUNNER_TEMP/blobs-b"
          BIND_PORT=7101 HTTP_PORT=8101 MODEL=fable-mini BLOB_DIR="$RUNNER_TEMP/blobs-a" \
            ./target/debug/examples/reason_node > "$RUNNER_TEMP/node-a.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/node-a.pid"
          BIND_PORT=7102 HTTP_PORT=8102 BOOTSTRAP=127.0.0.1:7101 MODEL=fable-mini BLOB_DIR="$RUNNER_TEMP/blobs-b" \
            ./target/debug/examples/reason_node > "$RUNNER_TEMP/node-b.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/node-b.pid"
          for port in 8101 8102; do
            for i in $(seq 1 60); do
              curl -sf "http://127.0.0.1:$port/health" > /dev/null && break
              if [ "$i" -eq 60 ]; then
                echo "node on port $port never became healthy"
                cat "$RUNNER_TEMP"/node-*.log
                exit 1
              fi
              sleep 1
            done
          done
      - run: pip install './mycelium-py[typed]' ./langgraph-checkpoint-mycelium pytest pytest-asyncio langgraph httpx-sse
      - run: pytest langgraph-checkpoint-mycelium/tests mycelium-py/tests/test_typed.py mycelium-py/tests/test_reason.py -v
        env:
          MYCELIUM_TEST_PORT: 8101
          MYCELIUM_TEST_PORT_B: 8102
      # The LangGraph example ladder, rungs 0–5 (echo variant): each runs against the
      # shared A/B mesh above and prints `RUNG N OK`. Rung 03 needs the second node
      # (MYCELIUM_TEST_PORT_B); the rest ignore it. Rung 06 has its own step below.
      - name: LangGraph ladder rungs 0–5 (echo)
        run: |
          for rung in 00_hello_skill 01_typed 02_durable_state 03_cross_node 04_routed 05_traces; do
            echo "── $rung ──"
            MYCELIUM_TEST_PORT=8101 MYCELIUM_TEST_PORT_B=8102 python examples/langgraph/$rung.py || exit 1
          done
      # The rung-6 deploy/reheal flagship (echo variant): manages its OWN two-node mesh
      # (ports 73xx/83xx — disjoint from the shared A/B above) because it kills a node
      # mid-run. Proves a LangGraph graph's model dependency follows it across node death.
      - run: cargo build -p mycelium-reason --features llm,gateway --example reheal_node
      - run: python examples/langgraph/06_deploy_reheal.py
      - name: Stop reason nodes
        if: always()
        run: |
          for n in a b; do
            [ -f "$RUNNER_TEMP/node-$n.pid" ] && kill "$(cat "$RUNNER_TEMP/node-$n.pid")" 2>/dev/null || true
          done

  conway-gpu:
    # Standalone GPU demo (examples/conway-gpu): excluded from the workspace so its
    # wgpu stack is NOT a mycelium dev-dependency (it used to drag the whole GPU
    # toolchain into every `cargo test` / `clippy --tests`). Compile-check it here in
    # its own parallel, cached job so the demo doesn't bit-rot — off the hot path.
    name: Conway GPU demo (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --manifest-path examples/conway-gpu/Cargo.toml

  demo-smoke:
    name: Demo smoke (community cluster + mock LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --bin skillrunner --features a2a
      # Scripted run of the community demo against a deterministic mock LLM.
      # Promoted to CI after a live run-through (2026-06-11) found four
      # substrate bugs that unit tests and Docker scenarios never touched:
      # gateway router clobber, A2A tasks/send timeout, tool results sent as
      # non-string content, skillrunner surviving SIGTERM. Each smoke
      # assertion is a regression gate for one of them.
      - run: ./examples/community/ci_smoke.sh

  audit:
    name: Dependency audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # Fails on vulnerabilities; unmaintained/unsound advisories surface as
      # warnings (tracked: bincode RUSTSEC-2025-0141 — wire-codec succession
      # is a ROADMAP v2 item).
      - run: cargo audit

  afn-smoke:
    name: AFN fluid-pipeline smoke (pull + push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --example three_node_demo
      # Both distribution modes of the AFN demo end-to-end as local processes:
      # pull (tuple-space take/complete — the canonical pattern) and push
      # (coordinator-dispatch baseline kept for comparison). Asserts 24/24
      # completion in each; fresh nodes per mode.
      - run: ./examples/fluid_pipeline/ci_smoke.sh both

  coop-smoke:
    name: Food-Rescue Co-op example suite (12 demos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      # Pre-build the crate WITH `wasm` (provisioning + catalog pull wasmtime — a long first compile
      # cached by rust-cache) so the smoke's per-demo `cargo run`s are warm and the run-phase timing
      # isn't dominated by the build. `wasm` is opt-in (examples/coop/Cargo.toml) so the other ten
      # demos build without wasmtime locally; here we warm everything.
      - run: cargo build -p mycelium-coop-examples --features wasm
      # All nine examples end-to-end as local in-process clusters: mailbox↔LLM,
      # stigmergy, elastic-intent, the WASM autonomic flagship (+ failover),
      # cross-domain AgentFacts, identity rotation, cross-group consensus,
      # LLM-over-tuple-space coordination, and on-demand MCP tool-growth. Each
      # demo asserts its own invariants; the script fails on the first miss.
      - run: ./examples/coop/ci_smoke.sh

  sdk-ts:
    name: TypeScript SDK type check
    runs-on: ubuntu-latest
    # The TS SDK shipped 8 tsc errors — including a runtime-breaking
    # `this._base` typo in shardFor() — because nothing in CI ever ran the
    # compiler over it (M2 Run-21). The jest suite skips without a live node,
    # so `tsc --noEmit` is the gate.
    defaults:
      run:
        working-directory: mycelium-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mycelium-ts/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  fuzz:
    name: Fuzz (wire + capability decoders, time-boxed)
    runs-on: ubuntu-latest
    # Dedicated cargo-fuzz job: the in-suite mini-fuzz (test job above) covers
    # adversarial decode on every push, but the libFuzzer targets explore far
    # deeper. Run 20's decode-DoS sat uncaught while these targets existed
    # without a CI job. Skipped on PRs to keep review latency low; runs on
    # main pushes and the weekly schedule.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      # Explicit `tool:` form — the @cargo-fuzz tag shorthand resolved to no
      # tool at all on first run ("no such command: fuzz", exit 101).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # `+nightly` is required even though the toolchain action installs
      # nightly: the repo's rust-toolchain.toml pins stable, which otherwise
      # wins toolchain resolution and -Zsanitizer=address fails to parse.
      # Explicit gnu target: the prebuilt cargo-fuzz binary is musl-static
      # and defaults to its own build triple, but ASan is incompatible with
      # statically linked libc ("can't find crate for core" on musl).
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu wire_decode -- -max_total_time=120
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu capability_decode -- -max_total_time=120

  loom:
    # Permutation model-checking of the lock-free/atomic patterns (the
    # calibration ledger's recurring "act on a stale read" bug family). `loom-spike`
    # is a deliberately tokio-free sibling crate: `--cfg loom` is global to a build
    # and tokio gates net/fs behind `#![cfg(not(loom))]`, so any tokio-linked crate
    # fails to compile under it. The suite compiles to an EMPTY crate without the cfg;
    # only `--cfg loom` (via RUSTFLAGS) pulls loom in and runs the models. This runs
    # the CORRECT tests only — the `#[ignore]`d broken twins (executable proof loom
    # catches the race) stay out of the default run, so CI is green.
    name: Loom (concurrency model-check)
    runs-on: ubuntu-latest
    env:
      # Bound the exploration (loom is exponential in preemptions). The models
      # are tiny (2–3 threads, 1–2 atomics); this is belt-and-braces headroom.
      LOOM_MAX_PREEMPTIONS: 3
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: RUSTFLAGS="--cfg loom" cargo test -p loom-spike --release
