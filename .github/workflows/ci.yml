name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: RUSTSEC advisories land without any code change (M2 Run-19
    # found two applicable advisories that no push-triggered gate could
    # have caught). Monday 06:00 UTC.
    - cron: '0 6 * * 1'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib
      - run: cargo test --lib --features tls,metrics,a2a,llm
      # In-suite decoder mini-fuzz (gated behind fuzz-internals). The fuzz/
      # targets existed for the whole project's life but were never executed
      # in CI, and an unbounded-allocation decode DoS sat uncaught (M2 Run-20).
      - run: cargo test --lib --features fuzz-internals mini_fuzz_decoders_survive_adversarial_bytes
      - run: cargo test -p mycelium-tuple-space --features gateway
      # Examples are the documented contract for the guide chapters; an
      # examples-free CI let a stale include_str! path hide behind cargo's
      # incremental cache for weeks (mesh_demo manifests/ → presets/ rename).
      - run: cargo build --examples --features tls,metrics,a2a,llm

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Full feature matrix — `--lib --tests` alone misses code behind
      # #[cfg(feature = "tls")] etc. (same set CLAUDE.md mandates locally).
      - run: cargo clippy --lib --tests --features tls,metrics,a2a,llm -- -D warnings
      - run: cargo clippy -p mycelium-tuple-space --features gateway --all-targets -- -D warnings

  embedded:
    name: Gateway-free build (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --no-default-features -- -D warnings

  demo-smoke:
    name: Demo smoke (community cluster + mock LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --bin skillrunner --features a2a
      # Scripted run of the community demo against a deterministic mock LLM.
      # Promoted to CI after a live run-through (2026-06-11) found four
      # substrate bugs that unit tests and Docker scenarios never touched:
      # gateway router clobber, A2A tasks/send timeout, tool results sent as
      # non-string content, skillrunner surviving SIGTERM. Each smoke
      # assertion is a regression gate for one of them.
      - run: ./examples/community/ci_smoke.sh

  audit:
    name: Dependency audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # Fails on vulnerabilities; unmaintained/unsound advisories surface as
      # warnings (tracked: bincode RUSTSEC-2025-0141 — wire-codec succession
      # is a ROADMAP v2 item).
      - run: cargo audit
