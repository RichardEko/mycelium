name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: RUSTSEC advisories land without any code change (M2 Run-19
    # found two applicable advisories that no push-triggered gate could
    # have caught). Monday 06:00 UTC.
    - cron: '0 6 * * 1'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib
      - run: cargo test --lib --features tls,metrics,a2a,llm
      # In-suite decoder mini-fuzz (gated behind fuzz-internals). The fuzz/
      # targets existed for the whole project's life but were never executed
      # in CI, and an unbounded-allocation decode DoS sat uncaught (M2 Run-20).
      - run: cargo test --lib --features fuzz-internals mini_fuzz_decoders_survive_adversarial_bytes
      - run: cargo test -p mycelium-tuple-space --features gateway
      # Examples are the documented contract for the guide chapters; an
      # examples-free CI let a stale include_str! path hide behind cargo's
      # incremental cache for weeks (mesh_demo manifests/ → presets/ rename).
      - run: cargo build --examples --features tls,metrics,a2a,llm

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Full feature matrix — `--lib --tests` alone misses code behind
      # #[cfg(feature = "tls")] etc. (same set CLAUDE.md mandates locally).
      - run: cargo clippy --lib --tests --features tls,metrics,a2a,llm -- -D warnings
      - run: cargo clippy -p mycelium-tuple-space --features gateway --all-targets -- -D warnings

  embedded:
    name: Gateway-free build (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --no-default-features -- -D warnings

  wasm-host:
    # WS-E M12 companion crate. Its own job: it pulls wasmtime (large first
    # build; rust-cache amortises it) and runs in parallel so it never blocks
    # the main test/clippy jobs. wasmtime is confined here — never in mycelium /
    # mycelium-core (the WS-A dep-tree invariant).
    name: WASM host (WS-E M12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p mycelium-wasm-host
      - run: cargo clippy -p mycelium-wasm-host --all-targets -- -D warnings

  agentfacts:
    # WS-F M16-A companion crate (self-certified AgentFacts emission). Public-API
    # only; its own job for parallelism + caching.
    name: AgentFacts (WS-F M16-A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p mycelium-agentfacts
      - run: cargo clippy -p mycelium-agentfacts --all-targets -- -D warnings

  blackboard:
    # WS-G G3 companion crate (claim-by-predicate shared working memory). Public-API
    # only; its own job for parallelism + caching.
    name: Blackboard (WS-G G3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p mycelium-blackboard --features gateway
      - run: cargo clippy -p mycelium-blackboard --features gateway --all-targets -- -D warnings
      # The community-microgrid worked example (rd shared / in competitive), Docker-free.
      - run: ./mycelium-blackboard/ci_smoke.sh

  wiki:
    # Group-scoped LLM-curated wiki companion crate. Phase 1 = the data plane (Store trait +
    # FsStore), Mycelium-agnostic; the control plane (curator role + failover) is a later feature.
    name: Wiki (data plane)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p mycelium-wiki
      - run: cargo clippy -p mycelium-wiki --all-targets -- -D warnings
      # Phase 2 — the Mycelium control plane (curator election + failover, single-writer apply).
      - run: cargo test -p mycelium-wiki --features control-plane
      - run: cargo clippy -p mycelium-wiki --features control-plane --all-targets -- -D warnings
      # Phase 3 — the LLM curator (the 3-way reconcile; the EchoBackend test proves the backend wiring).
      - run: cargo test -p mycelium-wiki --features llm
      - run: cargo clippy -p mycelium-wiki --features llm --all-targets -- -D warnings

  conway-gpu:
    # Standalone GPU demo (examples/conway-gpu): excluded from the workspace so its
    # wgpu stack is NOT a mycelium dev-dependency (it used to drag the whole GPU
    # toolchain into every `cargo test` / `clippy --tests`). Compile-check it here in
    # its own parallel, cached job so the demo doesn't bit-rot — off the hot path.
    name: Conway GPU demo (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --manifest-path examples/conway-gpu/Cargo.toml

  demo-smoke:
    name: Demo smoke (community cluster + mock LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --bin skillrunner --features a2a
      # Scripted run of the community demo against a deterministic mock LLM.
      # Promoted to CI after a live run-through (2026-06-11) found four
      # substrate bugs that unit tests and Docker scenarios never touched:
      # gateway router clobber, A2A tasks/send timeout, tool results sent as
      # non-string content, skillrunner surviving SIGTERM. Each smoke
      # assertion is a regression gate for one of them.
      - run: ./examples/community/ci_smoke.sh

  audit:
    name: Dependency audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # Fails on vulnerabilities; unmaintained/unsound advisories surface as
      # warnings (tracked: bincode RUSTSEC-2025-0141 — wire-codec succession
      # is a ROADMAP v2 item).
      - run: cargo audit

  afn-smoke:
    name: AFN fluid-pipeline smoke (pull + push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --example three_node_demo
      # Both distribution modes of the AFN demo end-to-end as local processes:
      # pull (tuple-space take/complete — the canonical pattern) and push
      # (coordinator-dispatch baseline kept for comparison). Asserts 24/24
      # completion in each; fresh nodes per mode.
      - run: ./examples/fluid_pipeline/ci_smoke.sh both

  coop-smoke:
    name: Food-Rescue Co-op example suite (12 demos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      # Pre-build the crate WITH `wasm` (provisioning + catalog pull wasmtime — a long first compile
      # cached by rust-cache) so the smoke's per-demo `cargo run`s are warm and the run-phase timing
      # isn't dominated by the build. `wasm` is opt-in (examples/coop/Cargo.toml) so the other ten
      # demos build without wasmtime locally; here we warm everything.
      - run: cargo build -p mycelium-coop-examples --features wasm
      # All nine examples end-to-end as local in-process clusters: mailbox↔LLM,
      # stigmergy, elastic-intent, the WASM autonomic flagship (+ failover),
      # cross-domain AgentFacts, identity rotation, cross-group consensus,
      # LLM-over-tuple-space coordination, and on-demand MCP tool-growth. Each
      # demo asserts its own invariants; the script fails on the first miss.
      - run: ./examples/coop/ci_smoke.sh

  sdk-ts:
    name: TypeScript SDK type check
    runs-on: ubuntu-latest
    # The TS SDK shipped 8 tsc errors — including a runtime-breaking
    # `this._base` typo in shardFor() — because nothing in CI ever ran the
    # compiler over it (M2 Run-21). The jest suite skips without a live node,
    # so `tsc --noEmit` is the gate.
    defaults:
      run:
        working-directory: mycelium-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mycelium-ts/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  fuzz:
    name: Fuzz (wire + capability decoders, time-boxed)
    runs-on: ubuntu-latest
    # Dedicated cargo-fuzz job: the in-suite mini-fuzz (test job above) covers
    # adversarial decode on every push, but the libFuzzer targets explore far
    # deeper. Run 20's decode-DoS sat uncaught while these targets existed
    # without a CI job. Skipped on PRs to keep review latency low; runs on
    # main pushes and the weekly schedule.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      # Explicit `tool:` form — the @cargo-fuzz tag shorthand resolved to no
      # tool at all on first run ("no such command: fuzz", exit 101).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # `+nightly` is required even though the toolchain action installs
      # nightly: the repo's rust-toolchain.toml pins stable, which otherwise
      # wins toolchain resolution and -Zsanitizer=address fails to parse.
      # Explicit gnu target: the prebuilt cargo-fuzz binary is musl-static
      # and defaults to its own build triple, but ASan is incompatible with
      # statically linked libc ("can't find crate for core" on musl).
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu wire_decode -- -max_total_time=120
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu capability_decode -- -max_total_time=120
