name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: RUSTSEC advisories land without any code change (M2 Run-19
    # found two applicable advisories that no push-triggered gate could
    # have caught). Monday 06:00 UTC.
    - cron: '0 6 * * 1'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib
      - run: cargo test --lib --features tls,metrics,a2a,llm
      - run: cargo test -p mycelium-tuple-space --features gateway

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Full feature matrix — `--lib --tests` alone misses code behind
      # #[cfg(feature = "tls")] etc. (same set CLAUDE.md mandates locally).
      - run: cargo clippy --lib --tests --features tls,metrics,a2a,llm -- -D warnings
      - run: cargo clippy -p mycelium-tuple-space --features gateway --all-targets -- -D warnings

  embedded:
    name: Gateway-free build (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --no-default-features -- -D warnings

  audit:
    name: Dependency audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # Fails on vulnerabilities; unmaintained/unsound advisories surface as
      # warnings (tracked: bincode RUSTSEC-2025-0141 — wire-codec succession
      # is a ROADMAP v2 item).
      - run: cargo audit
