# Mycelium MCP chat demo — local-LLM edition
#
# Eight containers (all discovered dynamically — no central registry):
#   ollama             —  local LLM runtime; pulls llama3.2 on first start
#   model-init         —  one-shot: waits for Ollama, pulls llama3.2, then exits
#   model-init-verify  —  one-shot: pulls llama3.1:8b for the claims verifier
#   tool-a             —  weather + web_fetch tools
#   tool-b             —  calculate + wiki tools
#   tool-sf            —  SF Encyclopedia (SFE3) scholarly lookup  ← joins mesh live
#   tool-book          —  Wikipedia full-article plot lookup       ← joins mesh live
#   verifier           —  claims verifier: checks LLM answers against tool results
#   llm                —  discovers all tools over gossip, serves interactive chat UI
#   mgmt               —  mesh dashboard at http://localhost:8090
#
# No API key required — Ollama runs entirely on your machine.
#
# Run:
#   cd docker
#   docker compose up --build
#
# Then open http://localhost:8080 in your browser and start chatting.
#
# Useful endpoints:
#   http://localhost:8080        # chat UI
#   http://localhost:8080/mesh   # live tool list + model name
#   http://localhost:8090        # mesh dashboard (nodes, tools, TCP peers)

services:

  # ── Ollama (local LLM runtime) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── One-shot model pulls (exit 0 when done) ──────────────────────────────────
  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - mesh
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]
    restart: "no"

  model-init-verify:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - mesh
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.1:8b"]
    restart: "no"

  # ── Mycelium tool nodes ───────────────────────────────────────────────────────
  tool-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: tool-a
    # Use kernel-reported IP so Mycelium binds to the actual container address
    # rather than a Docker DNS name that may not resolve during simultaneous startup.
    entrypoint: ["sh", "-c", "MYCELIUM_HOSTNAME=$(hostname -I | awk '{print $1}') exec /usr/local/bin/mycelium-demo"]
    environment:
      MYCELIUM_ROLE:      tool-a
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-b:57000,llm:57000,mgmt:57000,tool-sf:57000,tool-book:57000"
      RUST_LOG:           "info,mycelium=info"
    ports:
      - "8300:8300"
    networks:
      - mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8300/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  tool-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: tool-b
    entrypoint: ["sh", "-c", "MYCELIUM_HOSTNAME=$(hostname -I | awk '{print $1}') exec /usr/local/bin/mycelium-demo"]
    environment:
      MYCELIUM_ROLE:      tool-b
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,llm:57000,mgmt:57000,tool-sf:57000,tool-book:57000"
      RUST_LOG:           "info,mycelium=info"
    ports:
      - "8301:8300"
    networks:
      - mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8300/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Management dashboard node ────────────────────────────────────────────────
  mgmt:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: mgmt
    entrypoint: ["sh", "-c", "MYCELIUM_HOSTNAME=$(hostname -I | awk '{print $1}') exec /usr/local/bin/mycelium-demo"]
    environment:
      MYCELIUM_ROLE:      mgmt
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,tool-b:57000,llm:57000,tool-sf:57000,tool-book:57000,verifier:57000"
      RUST_LOG:           "info,mycelium=info"
      MGMT_PORT:          "8090"
    ports:
      - "8090:8090"   # management dashboard — open http://localhost:8090
    networks:
      - mesh
    depends_on:
      tool-a:
        condition: service_healthy
      tool-b:
        condition: service_healthy
    restart: unless-stopped

  # ── Specialist tool nodes (SF Encyclopedia + book plots) ─────────────────────
  tool-sf:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: tool-sf
    entrypoint: ["sh", "-c", "MYCELIUM_HOSTNAME=$(hostname -I | awk '{print $1}') exec /usr/local/bin/mycelium-demo"]
    environment:
      MYCELIUM_ROLE:      tool-sf
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,tool-b:57000,mgmt:57000"
      RUST_LOG:           "warn"
    ports:
      - "8303:8300"
    networks:
      - mesh
    depends_on:
      tool-a:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8300/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  tool-book:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: tool-book
    entrypoint: ["sh", "-c", "MYCELIUM_HOSTNAME=$(hostname -I | awk '{print $1}') exec /usr/local/bin/mycelium-demo"]
    environment:
      MYCELIUM_ROLE:      tool-book
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,tool-b:57000,mgmt:57000"
      RUST_LOG:           "warn"
    ports:
      - "8304:8300"
    networks:
      - mesh
    depends_on:
      tool-b:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8300/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Claims verifier node ──────────────────────────────────────────────────────
  verifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: verifier
    entrypoint: ["sh", "-c", "MYCELIUM_HOSTNAME=$(hostname -I | awk '{print $1}') exec /usr/local/bin/mycelium-demo"]
    environment:
      MYCELIUM_ROLE:      verifier
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,tool-b:57000,llm:57000,mgmt:57000"
      RUST_LOG:           "warn"
      OLLAMA_BASE_URL:    "http://ollama:11434/v1"
      VERIFIER_MODEL:     "llama3.1:8b"
    ports:
      - "8305:8300"
    networks:
      - mesh
    depends_on:
      model-init-verify:
        condition: service_completed_successfully
      tool-a:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8300/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── LLM + chat UI node ───────────────────────────────────────────────────────
  llm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: llm
    entrypoint: ["sh", "-c", "MYCELIUM_HOSTNAME=$(hostname -I | awk '{print $1}') exec /usr/local/bin/mycelium-demo"]
    environment:
      MYCELIUM_ROLE:      llm
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,tool-b:57000,mgmt:57000,tool-sf:57000,tool-book:57000,verifier:57000"
      RUST_LOG:           "info,mycelium=info"
      OLLAMA_BASE_URL:    "http://ollama:11434/v1"
      OLLAMA_MODEL:       "llama3.2"
      CHAT_PORT:          "8080"
    ports:
      - "8080:8080"   # chat UI — open http://localhost:8080
      - "8302:8300"   # Mycelium gateway (optional, for inspection)
    networks:
      - mesh
    depends_on:
      model-init:
        condition: service_completed_successfully
      tool-a:
        condition: service_healthy
      tool-b:
        condition: service_healthy
      tool-sf:
        condition: service_healthy
      tool-book:
        condition: service_healthy
      verifier:
        condition: service_healthy
    restart: unless-stopped

networks:
  mesh:
    driver: bridge

volumes:
  ollama-models:
