# Mycelium three-node demo — local-LLM edition
#
# Four containers:
#   ollama      —  local LLM runtime; pulls llama3.2 on first start
#   model-init  —  one-shot: waits for Ollama, pulls llama3.2, then exits
#   tool-a      —  weather + web_fetch tools (calls wttr.in / any URL)
#   tool-b      —  calculator + Wikipedia lookup tools
#   llm         —  discovers tools over gossip, serves interactive chat UI
#
# No API key required — Ollama runs entirely on your machine.
#
# Run:
#   cd docker
#   docker compose up --build
#
# Then open http://localhost:8080 in your browser and start chatting.
#
# Other useful endpoints:
#   curl http://localhost:8080/mesh          # tool list + model info
#   curl http://localhost:8300/health        # tool-a gateway
#   curl http://localhost:8301/health        # tool-b gateway
#   curl http://localhost:8302/health        # llm gateway

services:

  # ── Ollama (local LLM runtime) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - mesh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── One-shot model pull (exits 0 when done) ──────────────────────────────────
  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - mesh
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]
    restart: "no"

  # ── Mycelium tool nodes ───────────────────────────────────────────────────────
  tool-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: tool-a
    environment:
      MYCELIUM_ROLE:      tool-a
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-b:57000,llm:57000,mgmt:57000"
      RUST_LOG:           "info,mycelium=info"
    ports:
      - "8300:8300"
    networks:
      - mesh
    restart: unless-stopped

  tool-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: tool-b
    environment:
      MYCELIUM_ROLE:      tool-b
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,llm:57000,mgmt:57000"
      RUST_LOG:           "info,mycelium=info"
    ports:
      - "8301:8300"
    networks:
      - mesh
    restart: unless-stopped

  # ── Management dashboard node ────────────────────────────────────────────────
  mgmt:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: mgmt
    environment:
      MYCELIUM_ROLE:      mgmt
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,tool-b:57000,llm:57000"
      RUST_LOG:           "info,mycelium=info"
      MGMT_PORT:          "8090"
    ports:
      - "8090:8090"   # management dashboard — open http://localhost:8090
    networks:
      - mesh
    depends_on:
      - tool-a
      - tool-b
    restart: unless-stopped

  # ── LLM + chat UI node ───────────────────────────────────────────────────────
  llm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: llm
    environment:
      MYCELIUM_ROLE:      llm
      MYCELIUM_PORT:      "57000"
      MYCELIUM_HTTP_PORT: "8300"
      MYCELIUM_PEERS:     "tool-a:57000,tool-b:57000,mgmt:57000"
      RUST_LOG:           "info,mycelium=info"
      OLLAMA_BASE_URL:    "http://ollama:11434/v1"
      OLLAMA_MODEL:       "llama3.2"
      CHAT_PORT:          "8080"
    ports:
      - "8080:8080"   # chat UI — open http://localhost:8080
      - "8302:8300"   # Mycelium gateway (optional, for inspection)
    networks:
      - mesh
    depends_on:
      model-init:
        condition: service_completed_successfully
      tool-a:
        condition: service_started
      tool-b:
        condition: service_started
    restart: unless-stopped

networks:
  mesh:
    driver: bridge

volumes:
  ollama-models:
