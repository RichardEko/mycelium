# llm_agent example — Docker integration test
#
# All three gossip nodes run in-process inside a single container (llm_agent is
# a self-contained demo binary). The runner container hits the HTTP UI on port 8100
# (n-0, always the initial manager) and runs automated assertions.
#
# Usage:
#   make test-llm-agent          # automated test with MOCK_LLM=1 (no Ollama needed)
#   make llm-agent-interactive   # interactive run with real Ollama on http://localhost:8100

services:

  # ── llm_agent demo process ──────────────────────────────────────────────────
  llm-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.llm-agent
    container_name: mycelium-llm-agent
    hostname: llm-agent
    environment:
      MOCK_LLM:       "${MOCK_LLM:-1}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-http://localhost:11434/v1}"
      OPENAI_MODEL:   "${OPENAI_MODEL:-llama3.2}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-ollama}"
      RUST_LOG:       "warn"
    ports:
      - "8100:8100"   # n-0 HTTP (initial manager)
      - "8101:8101"   # n-1 HTTP
      - "8102:8102"   # n-2 HTTP
    networks:
      - llm-demo
    restart: "no"

  # ── Test runner ─────────────────────────────────────────────────────────────
  runner:
    build:
      context: llm-agent-runner
    container_name: mycelium-llm-agent-runner
    environment:
      LLM_AGENT_HOST:      llm-agent
      LLM_AGENT_HTTP_PORT: "8100"
    depends_on:
      - llm-agent
    networks:
      - llm-demo
    restart: "no"

networks:
  llm-demo:
    driver: bridge
