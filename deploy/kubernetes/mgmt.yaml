# The management dashboard — a read-only viewer node so you can *watch* the cluster form,
# converge, partition and heal. Not part of the data plane; a single replica is fine.
# View it with:  kubectl -n mycelium port-forward svc/mycelium-mgmt 8090:8090  → http://localhost:8090
apiVersion: v1
kind: Service
metadata:
  name: mycelium-mgmt
  labels: { app: mycelium, role: mgmt }
spec:
  selector: { app: mycelium, role: mgmt }
  ports:
    - { name: dashboard, port: 8090, targetPort: 8090 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycelium-mgmt
  labels: { app: mycelium, role: mgmt }
spec:
  replicas: 1
  selector:
    matchLabels: { app: mycelium, role: mgmt }
  template:
    metadata:
      labels: { app: mycelium, role: mgmt }
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mycelium
          image: mycelium-demo:latest     # kustomization overrides this; see deploy/kubernetes/README.md
          imagePullPolicy: IfNotPresent
          ports:
            - { name: gossip, containerPort: 57000 }
            - { name: dashboard, containerPort: 8090 }
          env:
            - name: MYCELIUM_ROLE
              value: "mgmt"
            - name: MYCELIUM_PORT
              value: "57000"
            - name: MGMT_PORT
              value: "8090"
            - name: MYCELIUM_HOSTNAME
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: MYCELIUM_PEERS
              value: "mycelium-seed-0.mycelium-seed.$(POD_NAMESPACE).svc.cluster.local:57000"
            - name: GOSSIP_CLUSTER_NAME
              value: "mycelium-k8s"
            - name: GOSSIP_SWIM_FAILURE_DETECTOR
              value: "1"
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { memory: "256Mi" }
